const DAY_RULES = {

  songstage:['Tuesday','Friday'], freelance:['Thursday'],
  content:['Monday','Wednesday','Thursday'],
};

// Google API
let gapiLoaded = false, gisLoaded = false, tokenClient = null;

function loadGapi() {
  return new Promise(res => {
    if (gapiLoaded) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs:[
        'https://sheets.googleapis.com/$discovery/rest?version=v4',
        'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'
      ]});
      gapiLoaded = true; res();
    });
    document.head.appendChild(s);
  });
}

function loadGis() {
  return new Promise(res => {
    if (gisLoaded) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => { gisLoaded = true; res(); };
    document.head.appendChild(s);
  });
}

async function initGoogle(onToken) {
  await Promise.all([loadGapi(), loadGis()]);
  tokenClient = google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback:onToken });
}

function requestToken() { tokenClient && tokenClient.requestAccessToken({ prompt:'' }); }

async function readSheet(tab) {
  try {
    const r = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:SHEET_ID, range:`${tab}!A2:Z` });
    return r.result.values || [];
  } catch(e) { return []; }
}

async function appendRow(tab, values) {
  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId:SHEET_ID, range:`${tab}!A1`, valueInputOption:'USER_ENTERED', resource:{ values:[values] }
  });
}

async function updateCell(tab, rowIndex, colIndex, value) {
  const col = String.fromCharCode(65 + colIndex);
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId:SHEET_ID, range:`${tab}!${col}${rowIndex+2}`,
    valueInputOption:'USER_ENTERED', resource:{ values:[[value]] }
  });
}

async function deleteRowFromSheet(tab, rowIndex) {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId:SHEET_ID });
  const sheet = meta.result.sheets.find(s=>s.properties.title===tab);
  if (!sheet) return;
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId:SHEET_ID,
    resource:{ requests:[{ deleteDimension:{ range:{ sheetId:sheet.properties.sheetId, dimension:'ROWS', startIndex:rowIndex+1, endIndex:rowIndex+2 }}}]}
  });
}

async function getCalendarEvents() {
  try {
    const now = new Date(), end = new Date(now);
    end.setDate(end.getDate()+7);
    const r = await gapi.client.calendar.events.list({ calendarId:'primary', timeMin:now.toISOString(), timeMax:end.toISOString(), singleEvents:true, orderBy:'startTime', maxResults:15 });
    return r.result.items || [];
  } catch(e) { return []; }
}

async function createCalendarEvent(title, date, startHour, durationHours) {
  const start = new Date(date); start.setHours(startHour,0,0,0);
  const end = new Date(start); end.setHours(startHour+durationHours);
  await gapi.client.calendar.events.insert({ calendarId:'primary', resource:{
    summary:`[Jesse HQ] ${title}`, start:{ dateTime:start.toISOString() }, end:{ dateTime:end.toISOString() }
  }});
}

// Utils
function getWeekLabel() {
  const d = new Date(), day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  const mon = new Date(d.setDate(diff));
  return `Week of ${mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}

function daysSince(dateStr) {
  if (!dateStr) return 0;
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

function getAvailableSlots(track) {
  const allowed = DAY_RULES[track] || [];
  const slots = [], today = new Date();
  for (let i=0; i<7; i++) {
    const d = new Date(today); d.setDate(today.getDate()+i);
    const dayName = d.toLocaleDateString('en-US',{weekday:'long'});
    if (allowed.includes(dayName)) {
      slots.push({ date:d, label:d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}), dayName, startHour:9 });
    }
  }
  return slots;
}

function rowToItem(track, row, index) {
  return { id:index, name:row[0]||'', type:row[1]||'', status:row[2]||'', extra:row[3]||'', dueDate:row[4]||'', notes:row[5]||'', dateAdded:row[7]||'', track };
}

    { id:2, name:'Fix login redirect', type:'Bug', status:'Review', extra:'Dylan', dueDate:'2026-04-10', notes:'', dateAdded:'2026-04-06', track:'songstage' },
  ],
  freelance:[
    { id:0, name:'Church of the City session', type:'Session', status:'Booked', extra:'CoTC', dueDate:'2026-04-14', notes:'Guitar tracking', dateAdded:'2026-04-03', track:'freelance' },
    { id:1, name:'Artist coaching - Sarah', type:'Coaching', status:'In Progress', extra:'Sarah K', dueDate:'', notes:'Monthly coaching', dateAdded:'2026-03-15', track:'freelance' },
  ],
  content:[
    { id:0, name:'How worship music gets licensed', type:'Long-Form', status:'In Progress', extra:'YouTube', dueDate:'2026-04-18', notes:'Script drafted', dateAdded:'2026-04-02', track:'content' },
    { id:1, name:'3 mistakes worship leaders make', type:'Short-Form', status:'Planned', extra:'Reels', dueDate:'2026-04-11', notes:'', dateAdded:'2026-04-07', track:'content' },
    { id:2, name:'Why I left Asana', type:'Substack', status:'Published', extra:'Substack', dueDate:'', notes:'', dateAdded:'2026-04-05', track:'content' },
  ],
};

const DEMO_GOALS = {
  records:'Finalize Still Waters mix and send to Chris for approval',
  publishing:'Follow up with LifeWay on Still Waters pitch',
  songstage:'Ship drag-drop feature, review login bug fix with Dylan',
  freelance:'Prep for CoTC session, reach out to 2 new coaching prospects',
  content:'Publish long-form YouTube, post 2 Reels',
};

// COMPONENTS
function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose,3500); return ()=>clearTimeout(t); },[]);
  return <div className="toast">{message}</div>;
}

function AddItemModal({ track, onClose, onAdd }) {
  const [form, setForm] = useState({ name:'', type:TYPES[track][0], status:STATUSES[track][0], extra:'', dueDate:'', notes:'' });
  const [step, setStep] = useState('form');
  const [slots, setSlots] = useState([]);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const t = TRACKS[track];
  const extraLabel = { records:'Artist', publishing:'Partner / Outlet', songstage:'Assigned To', freelance:'Client', content:'Platform' }[track];

  function handleNext() {
    if (!form.name.trim()) return;
    setSlots(getAvailableSlots(track));
    setStep('calendar');
  }

  function handleSave(blockCal) { onAdd({ ...form, blockCal, slot: slots[selectedSlot] }); onClose(); }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Add to {t.label}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {step==='form' ? (<>
          <div className="modal-body">
            <div className="form-group"><label className="form-label">Name *</label>
              <input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} autoFocus placeholder="Name..." /></div>
            <div className="form-group"><label className="form-label">Type</label>
              <select className="form-select" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                {TYPES[track].map(t=><option key={t}>{t}</option>)}</select></div>
            <div className="form-group"><label className="form-label">Status</label>
              <select className="form-select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                {STATUSES[track].map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="form-group"><label className="form-label">{extraLabel}</label>
              <input className="form-input" value={form.extra} onChange={e=>setForm({...form,extra:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Due Date</label>
              <input className="form-input" type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Notes</label>
              <textarea className="form-textarea form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} /></div>
          </div>
          <div className="modal-footer">
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={handleNext}>Next →</button>
          </div>
        </>) : (<>
          <div className="modal-body">
            <div className="cal-question">
              <div className="cal-question-text">Block time on your calendar for <strong>{form.name}</strong>?</div>
              <div style={{fontSize:'11px',color:'var(--text2)'}}>Best slots for {t.label} days ({DAY_RULES[track].join(', ')}):</div>
            </div>
            {slots.length===0
              ? <div style={{fontSize:'12px',color:'var(--text3)',padding:'12px 0'}}>No {t.label} days available this week.</div>
              : <div className="cal-slots">{slots.map((s,i)=>(
                  <div key={i} className={`cal-slot ${selectedSlot===i?'selected':''}`} onClick={()=>setSelectedSlot(i)}>
                    <span>{s.label} — 9:00 AM</span>
                    <span className="cal-slot-day">{s.dayName}</span>
                  </div>
                ))}</div>}
          </div>
          <div className="modal-footer">
            <button className="btn-secondary" onClick={()=>handleSave(false)}>Skip</button>
            <button className="btn-primary" onClick={()=>handleSave(selectedSlot!==null)}>
              {selectedSlot!==null?'Block Time + Save':'Save Without Blocking'}</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

function KanbanCard({ item, track, onStatusChange, onDelete, onMarkDone }) {
  const color = TRACKS[track].color;
  return (
    <div className="card">
      <div className="card-track-line" style={{background:color}} />
      <div className="card-name">{item.name}</div>
      <div className="card-meta">
        {item.type && <span className="tag">{item.type}</span>}
        {item.extra && <span className="tag">{item.extra}</span>}
        {item.dueDate && <span className="tag">Due {new Date(item.dueDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>}
      </div>
      {item.notes && <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'8px',paddingLeft:'10px'}}>{item.notes}</div>}
      <div className="card-actions">
        <select className="card-btn" value={item.status} onChange={e=>onStatusChange(item,e.target.value)} style={{fontFamily:'DM Mono,monospace',cursor:'pointer'}}>
          {STATUSES[track].map(s=><option key={s}>{s}</option>)}
        </select>
        <button className="card-btn done" onClick={()=>onMarkDone(item)}>✓ Done</button>
        <button className="card-btn delete" onClick={()=>onDelete(item)}>✕</button>
      </div>
    </div>
  );
}

function TrackPage({ track, items, onAdd, onStatusChange, onDelete, onMarkDone, loading }) {
  const t = TRACKS[track];
  const byStatus = {};
  STATUSES[track].forEach(s => { byStatus[s] = items.filter(i=>i.status===s); });

  return (
    <div className="page">
      <div className="track-header">
        <div>
          <div className="track-title" style={{color:t.color}}>{t.label}</div>
          <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px'}}>{items.length} items · {DAY_RULES[track].join(', ')} days</div>
        </div>
        <button className="add-btn" onClick={onAdd}>+ Add Item</button>
      </div>
      {loading
        ? <div style={{color:'var(--text3)',fontSize:'12px'}}>Loading from Google Sheets...</div>
        : <div className="kanban">
            {STATUSES[track].map(status=>(
              <div key={status} className="kanban-col">
                <div className="kanban-col-header">
                  <div className="kanban-col-title">{status}</div>
                  <div className="kanban-count">{(byStatus[status]||[]).length}</div>
                </div>
                <div className="kanban-cards">
                  {(byStatus[status]||[]).length===0
                    ? <div style={{fontSize:'11px',color:'var(--text3)',padding:'12px',border:'1px dashed var(--border)',textAlign:'center'}}>Empty</div>
                    : (byStatus[status]||[]).map(item=>(
                        <KanbanCard key={item.id} item={item} track={track}
                          onStatusChange={onStatusChange} onDelete={onDelete} onMarkDone={onMarkDone} />
                      ))}
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

function DashboardPage({ items, goals, calEvents, onAddToWeek }) {
  const allItems = Object.values(items).flat();
  const terminalStatuses = Object.values(TERMINAL);
  const stale = allItems.filter(i => !terminalStatuses.includes(i.status) && daysSince(i.dateAdded)>7);
  const weekGoals = Object.entries(goals).filter(([,v])=>v);

  return (
    <div className="page">
      <div style={{marginBottom:'28px'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:'28px',fontWeight:'800',marginBottom:'4px'}}>Command Center</div>
        <div style={{fontSize:'11px',color:'var(--text2)'}}>{getWeekLabel()} · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>

      <div className="dashboard-grid">
        {Object.entries(TRACKS).map(([key,t])=>{
          const trackItems = items[key]||[];
          const active = trackItems.filter(i=>i.status!==TERMINAL[key]).length;
          const done = trackItems.filter(i=>i.status===TERMINAL[key]).length;
          return (
            <div key={key} className={`stat-card ${key}`}>
              <div className="stat-label">{t.label}</div>
              <div className="stat-number" style={{color:t.color}}>{active}</div>
              <div className="stat-sub">active · {done} done</div>
            </div>
          );
        })}
        <div className="stat-card hours">
          <div className="stat-label">Weekly Time Targets</div>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:'13px',fontWeight:'700',lineHeight:'2',color:'var(--accent)'}}>
            Real Fun: 10–15h<br/>
            <span style={{color:'var(--songstage)'}}>Songstage: 15–20h</span><br/>
            <span style={{color:'var(--freelance)'}}>Freelance: ~10h</span>
          </div>
        </div>
      </div>

      {stale.length>0 && (
        <div className="stale-section">
          <div className="stale-title">⚠ Sitting &gt; 7 Days — Needs a Decision</div>
          {stale.slice(0,5).map((item,i)=>(
            <div key={i} className="stale-item">
              <div className="stale-item-left">
                <div className="nav-dot" style={{background:TRACKS[item.track].color}} />
                <span>{item.name}</span>
                <span className="tag" style={{marginLeft:'6px'}}>{item.status}</span>
                <span className="stale-days">{daysSince(item.dateAdded)}d</span>
              </div>
              <button className="add-to-week-btn" onClick={()=>onAddToWeek(item)}>+ Add to week</button>
            </div>
          ))}
        </div>
      )}

      {weekGoals.length>0 && (
        <div>
          <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'12px'}}>This Week's Goals</div>
          {weekGoals.map(([track,goal])=>(
            <div key={track} className="goal-card">
              <div className="goal-track-name" style={{color:TRACKS[track].color}}>{TRACKS[track].label}</div>
              <div className="goal-text">{goal}</div>
            </div>
          ))}
        </div>
      )}

      {calEvents.length>0 && (
        <div style={{marginTop:'24px'}}>
          <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'12px'}}>Upcoming Calendar</div>
          {calEvents.slice(0,5).map((e,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:'12px'}}>
              <div style={{color:'var(--text3)',fontSize:'10px',minWidth:'80px'}}>
                {e.start?.dateTime ? new Date(e.start.dateTime).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : 'All day'}
              </div>
              <div>{e.summary}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CheckInPage({ items, calEvents, goals, onGoalChange, onSave }) {
  const staleByTrack = {};
  Object.entries(items).forEach(([track,trackItems])=>{
    staleByTrack[track] = trackItems.filter(i=>i.status!==TERMINAL[track]&&daysSince(i.dateAdded)>5);
  });

  const prompts = {
    records:'What do you want to move forward? How does it connect to revenue?',
    publishing:"What's the publishing priority this week?",
    songstage:"Where does the product stand? What's the win this week?",
    freelance:"What's booked? Who do you need to reach out to?",
    content:'What are you publishing? (target: 2–3 short-form, 1 long-form, 1 Substack)',
  };

  return (
    <div className="page">
      <div className="checkin-wrap">
        <div className="checkin-intro">
          <div className="checkin-intro-title">Monday Check-In 🗓</div>
          <div className="checkin-intro-sub">Set your goals for the week. What matters most across each track?</div>
        </div>

        {calEvents.length>0 && (
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'10px'}}>Already on your calendar</div>
            {calEvents.slice(0,4).map((e,i)=>(
              <div key={i} style={{display:'flex',gap:'12px',fontSize:'12px',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{color:'var(--text3)',minWidth:'80px',fontSize:'10px'}}>
                  {e.start?.dateTime ? new Date(e.start.dateTime).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : 'All day'}
                </div>
                <div>{e.summary}</div>
              </div>
            ))}
          </div>
        )}

        {Object.entries(TRACKS).map(([track,t])=>(
          <div key={track} className={`checkin-section ${track}`}>
            <div className="checkin-section-title" style={{color:t.color}}>{t.label}</div>
            <div className="checkin-section-sub">{prompts[track]}</div>
            {staleByTrack[track]?.length>0 && (
              <div className="stale-prompt">
                ⚠ Sitting 5+ days: {staleByTrack[track].map(i=>i.name).join(', ')} — add to this week's goal?
              </div>
            )}
            <textarea className="form-textarea form-input"
              placeholder={`What's the goal for ${t.label} this week?`}
              value={goals[track]||''} onChange={e=>onGoalChange(track,e.target.value)} />
          </div>
        ))}

        <button className="btn-primary" style={{width:'100%',marginTop:'8px',padding:'14px'}} onClick={onSave}>
          Lock In This Week →
        </button>
      </div>
    </div>
  );
}

// MAIN APP
function App() {
  const [authed, setAuthed] = useState(false);
  const [demoMode, setDemoMode] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [items, setItems] = useState({records:[],publishing:[],songstage:[],freelance:[],content:[]});
  const [goals, setGoals] = useState({});
  const [calEvents, setCalEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  function showToast(msg) { setToast(msg); }

  useEffect(()=>{
    initGoogle(async resp=>{
      if (resp.error) return;
      setAuthed(true);
      await loadAllData();
    });
  },[]);

  useEffect(()=>{ if (demoMode) { setItems(DEMO); setGoals(DEMO_GOALS); } },[demoMode]);

  async function loadAllData() {
    setLoading(true);
    const loaded = {};
    for (const track of Object.keys(TRACKS)) {
      const rows = await readSheet(TRACKS[track].tab);
      loaded[track] = rows.map((r,i)=>rowToItem(track,r,i));
    }
    setItems(loaded);
    const goalRows = await readSheet('Weekly Goals');
    const thisWeek = getWeekLabel();
    const weekRow = goalRows.find(r=>r[0]===thisWeek);
    if (weekRow) setGoals({ records:weekRow[1]||'', publishing:weekRow[2]||'', songstage:weekRow[3]||'', freelance:weekRow[4]||'', content:weekRow[5]||'' });
    const events = await getCalendarEvents();
    setCalEvents(events);
    setLoading(false);
  }

  async function handleAdd(track, formData) {
    const { name, type, status, extra, dueDate, notes, blockCal, slot } = formData;
    const dateAdded = new Date().toISOString().split('T')[0];
    if (!demoMode) await appendRow(TRACKS[track].tab, [name,type,status,extra,dueDate,notes,'',dateAdded]);
    const newItem = { id:items[track].length, name, type, status, extra, dueDate, notes, dateAdded, track };
    setItems(prev=>({...prev,[track]:[...prev[track],newItem]}));
    if (blockCal && slot && !demoMode) {
      try { await createCalendarEvent(name,slot.date,slot.startHour,1.5); showToast(`✓ "${name}" added + time blocked`); }
      catch(e) { showToast(`✓ "${name}" added — calendar block failed`); }
    } else { showToast(`✓ "${name}" added to ${TRACKS[track].label}`); }
  }

  async function handleStatusChange(track, item, newStatus) {
    if (!demoMode) await updateCell(TRACKS[track].tab, item.id, 2, newStatus);
    setItems(prev=>({...prev,[track]:prev[track].map(i=>i.id===item.id?{...i,status:newStatus}:i)}));
    showToast(`↑ "${item.name}" → ${newStatus}`);
  }

  async function handleDelete(track, item) {
    if (!window.confirm(`Delete "${item.name}"?`)) return;
    if (!demoMode) await deleteRowFromSheet(TRACKS[track].tab, item.id);
    setItems(prev=>({...prev,[track]:prev[track].filter(i=>i.id!==item.id)}));
    showToast(`✕ "${item.name}" removed`);
  }

  async function handleMarkDone(track, item) { await handleStatusChange(track, item, TERMINAL[track]); }

  async function handleSaveGoals() {
    if (!demoMode) await appendRow('Weekly Goals',[getWeekLabel(),goals.records||'',goals.publishing||'',goals.songstage||'',goals.freelance||'',goals.content||'']);
    showToast('✓ Goals locked in for the week');
    setPage('dashboard');
  }

  if (!authed && !demoMode) {
    return (
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo">Jesse HQ</div>
          <div className="auth-tagline">Your command center across all five tracks</div>
          <div className="auth-features">
            {Object.entries(TRACKS).map(([key,t])=>(
              <div key={key} className="auth-feature">
                <div className="auth-feature-dot" style={{background:t.color}} />
                {t.label}
              </div>
            ))}
          </div>
          <button className="google-btn" onClick={requestToken}>
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
            Sign in with Google
          </button>
          <button className="demo-btn" onClick={()=>setDemoMode(true)}>Try Demo Mode</button>
        </div>
      </div>
    );
  }

  const trackKeys = Object.keys(TRACKS);

  return (
    <div className="app">
      <div className="sidebar">
        <div className="logo">
          <div className="logo-text">Jesse HQ</div>
          <div className="logo-sub">{demoMode?'Demo Mode':'Connected'}</div>
        </div>
        <nav className="nav">
          <div className="nav-section-label">Overview</div>
          <div className={`nav-item ${page==='dashboard'?'active':''}`} data-track="dashboard" onClick={()=>setPage('dashboard')}>
            <div className="nav-dot dashboard"/>Dashboard</div>
          <div className={`nav-item ${page==='checkin'?'active':''}`} data-track="checkin" onClick={()=>setPage('checkin')}>
            <div className="nav-dot checkin"/>Monday Check-In</div>
          <div className="nav-section-label" style={{marginTop:'8px'}}>Tracks</div>
          {Object.entries(TRACKS).map(([key,t])=>(
            <div key={key} className={`nav-item ${page===key?'active':''}`} data-track={key} onClick={()=>setPage(key)}>
              <div className={`nav-dot ${key}`}/>{t.label}</div>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="auth-status">
            <div className={`auth-dot ${authed?'connected':''}`}/>
            {authed?'Sheets + Calendar connected':demoMode?'Demo mode':'Not connected'}
          </div>
          {!authed&&!demoMode&&<button className="signin-btn" onClick={requestToken}>Connect Google</button>}
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">
            {page==='dashboard'&&'Dashboard'}
            {page==='checkin'&&'Monday Check-In'}
            {TRACKS[page]&&TRACKS[page].label}
          </div>
          <div className="topbar-right">
            <span className="week-badge">{getWeekLabel()}</span>
            {trackKeys.includes(page)&&<button className="add-btn" onClick={()=>setModal({track:page})}>+ Add Item</button>}
          </div>
        </div>

        {page==='dashboard'&&<DashboardPage items={items} goals={goals} calEvents={calEvents} onAddToWeek={(item)=>{setPage('checkin');showToast(`Adding "${item.name}" to weekly focus`);}} />}
        {page==='checkin'&&<CheckInPage items={items} calEvents={calEvents} goals={goals} onGoalChange={(track,val)=>setGoals(g=>({...g,[track]:val}))} onSave={handleSaveGoals} />}
        {trackKeys.includes(page)&&<TrackPage track={page} items={items[page]||[]} loading={loading}
          onAdd={()=>setModal({track:page})}
          onStatusChange={(item,status)=>handleStatusChange(page,item,status)}
          onDelete={(item)=>handleDelete(page,item)}
          onMarkDone={(item)=>handleMarkDone(page,item)} />}
      </div>

      {modal&&<AddItemModal track={modal.track} onClose={()=>setModal(null)} onAdd={formData=>handleAdd(modal.track,formData)} />}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
