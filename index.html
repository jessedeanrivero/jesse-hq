            <input className="form-input" type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})}/>
          </div>
          <div className="form-group">
            <label className="form-label">Notes</label>
            <textarea className="form-textarea form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" style={{color:'#ff4444',borderColor:'#ff444433'}} onClick={()=>{onDelete(item);onClose();}}>Delete</button>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

function KanbanCard({ item, track, onStatusChange, onDelete, onMarkDone, onEdit }) {
  const [showEdit, setShowEdit] = useState(false);
  const isOrgTask = item.type === 'Org Task' || item.type === 'General Task';
  const dueDate = item.dueDate ? new Date(item.dueDate + 'T12:00:00') : null;
  const isValidDate = dueDate && !isNaN(dueDate.getTime());
  const isOverdue = isValidDate && dueDate < new Date();
  const isDueSoon = isValidDate && !isOverdue && (dueDate - new Date()) < 3 * 86400000;
  return (
    <>
      <div className="card">
        <div className="card-track-line" style={{background:TRACKS[track].color}}/>
        <div className="card-name" style={{cursor:'pointer'}} onClick={()=>setShowEdit(true)}>{item.name}</div>
        <div className="card-meta">
          {isOrgTask
            ? <span className="tag" style={{color:'var(--accent)',borderColor:'rgba(232,255,71,0.3)'}}>Org Task</span>
            : item.type && <span className="tag">{item.type}</span>}
          {item.extra && <span className="tag">{item.extra}</span>}
          {item.owner && <span className="tag" style={{color:'var(--freelance)',borderColor:'rgba(180,124,255,0.3)'}}>👤 {item.owner}</span>}
          {isValidDate && (
            <span className="tag" style={{
              color: isOverdue?'#ff4444': isDueSoon?'var(--warning)':'var(--text3)',
              borderColor: isOverdue?'rgba(255,68,68,0.3)': isDueSoon?'rgba(255,179,71,0.3)':'var(--border)',
            }}>
              {isOverdue?'⚠ Overdue ': isDueSoon?'⏰ ':''}{dueDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
            </span>
          )}
        </div>
        {item.notes && <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'8px',paddingLeft:'10px'}}>{item.notes}</div>}
        <div className="card-actions">
          <select className="card-btn" value={item.status} onChange={e=>onStatusChange(item,e.target.value)} style={{fontFamily:'DM Mono,monospace',cursor:'pointer'}}>
            {STATUSES[track].map(s=><option key={s}>{s}</option>)}
          </select>
          <button className="card-btn" onClick={()=>setShowEdit(true)}>✎ Edit</button>
          <button className="card-btn done" onClick={()=>onMarkDone(item)}>✓ Done</button>
          <button className="card-btn delete" onClick={()=>onDelete(item)}>✕</button>
        </div>
      </div>
      {showEdit && (
        <EditCardModal item={item} track={track} onClose={()=>setShowEdit(false)}
          onSave={ev=>{onEdit(item,ev);setShowEdit(false);}} onDelete={ev=>{onDelete(ev);setShowEdit(false);}}/>
      )}
    </>
  );
}

function TrackPage({ track, items, onAdd, onStatusChange, onDelete, onMarkDone, onEdit, loading, calEvents }) {
  const t = TRACKS[track];
  const [showHidden, setShowHidden] = useState(false);
  const hidden = HIDDEN_STATUSES[track] || [];
  const visibleStatuses = showHidden
    ? STATUSES[track]
    : STATUSES[track].filter(s => !hidden.includes(s));
  const byStatus = {};
  STATUSES[track].forEach(s=>{ byStatus[s]=items.filter(i=>i.status===s); });

  // Completion stats for this track
  const doneStatuses = DONE_STATUSES[track] || [];
  const totalDone = items.filter(i=>doneStatuses.includes(i.status)).length;
  const thisWeek = getWeekLabel();
  const hiddenCount = hidden.reduce((acc,s)=>(byStatus[s]||[]).length+acc, 0);

  return (
    <div className="page">
      <div className="track-header">
        <div>
          <div className="track-title" style={{color:t.color}}>{t.label}</div>
          <div style={{fontSize:'11px',color:'var(--text2)',marginTop:'4px',display:'flex',gap:'16px'}}>
            <span>{items.length} items</span>
            {totalDone>0&&<span style={{color:'var(--success)'}}>✓ {totalDone} completed</span>}
            {hiddenCount>0&&!showHidden&&(
              <button className="btn-sm" onClick={()=>setShowHidden(true)} style={{fontSize:'10px',padding:'1px 8px'}}>
                Show {hiddenCount} done
              </button>
            )}
            {showHidden&&hidden.length>0&&(
              <button className="btn-sm" onClick={()=>setShowHidden(false)} style={{fontSize:'10px',padding:'1px 8px'}}>
                Hide done
              </button>
            )}
          </div>
        </div>
        <button className="add-btn" onClick={onAdd}>+ Add Item</button>
      </div>
      {loading
        ? <div style={{color:'var(--text3)',fontSize:'12px'}}>Loading...</div>
        : <div className="kanban">
            {visibleStatuses.map(status=>{
              const isDoneCol = hidden.includes(status);
              return (
                <div key={status} className="kanban-col">
                  <div className="kanban-col-header">
                    <div className="kanban-col-title" style={{color:isDoneCol?'var(--success)':undefined}}>{status}</div>
                    <div className="kanban-count">{(byStatus[status]||[]).length}</div>
                  </div>
                  <div className="kanban-cards">
                    {(byStatus[status]||[]).length===0
                      ? <div style={{fontSize:'11px',color:'var(--text3)',padding:'12px',border:'1px dashed var(--border)',textAlign:'center'}}>Empty</div>
                      : (byStatus[status]||[]).map(item=>(
                          <KanbanCard key={item.id} item={item} track={track}
                            onStatusChange={onStatusChange} onDelete={onDelete} onMarkDone={onMarkDone} onEdit={onEdit}/>
                        ))}
                  </div>
                </div>
              );
            })}
          </div>}
    </div>
  );
}


// ── EDIT EVENT MODAL ─────────────────────────────────────────────────────────
function EditEventModal({ event, onClose, onSave, onDelete }) {
  const start = event.start?.dateTime ? new Date(event.start.dateTime) : new Date();
  const end   = event.end?.dateTime   ? new Date(event.end.dateTime)   : new Date(start.getTime()+3600000);
  const toTimeStr = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const [form, setForm] = useState({
    title: event.summary||'',
    startTime: toTimeStr(start),
    endTime:   toTimeStr(end),
    date: start.toISOString().split('T')[0],
  });
  function save() {
    const sd=new Date(form.date+'T'+form.startTime);
    const ed=new Date(form.date+'T'+form.endTime);
    onSave({...event, summary:form.title, start:{dateTime:sd.toISOString()}, end:{dateTime:ed.toISOString()}});
    onClose();
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Edit Event</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Title</label>
            <input className="form-input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
          <div className="form-group"><label className="form-label">Date</label>
            <input className="form-input" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <div className="form-group"><label className="form-label">Start Time</label>
              <input className="form-input" type="time" value={form.startTime} onChange={e=>setForm({...form,startTime:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">End Time</label>
              <input className="form-input" type="time" value={form.endTime} onChange={e=>setForm({...form,endTime:e.target.value})}/></div>
          </div>
          {event._calendarName&&<div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>Calendar: {event._calendarName}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" style={{color:'#ff4444',borderColor:'#ff444433'}} onClick={()=>{onDelete(event);onClose();}}>Delete</button>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

// ── CALENDAR PAGE ─────────────────────────────────────────────────────────────
function CalendarPage({ calEvents, calendarList, onAddEvent, onEditEvent, onDeleteEvent, demoMode }) {
  const today = new Date();
  const [view, setView]      = useState('week');
  const [current, setCurrent]= useState(new Date());
  const [addEventDate, setAddEventDate] = useState(null);
  const [editEvent, setEditEvent]       = useState(null);

  const HOURS = Array.from({length:24},(_,i)=>i);

  function eventsForDay(d) {
    return calEvents.filter(e=>{
      const start = e.start?.dateTime ? new Date(e.start.dateTime) : e.start?.date ? new Date(e.start.date+'T00:00:00') : null;
      return start && isSameDay(start,d);
    });
  }

  function eventColor(e) {
    if (e._track) return TRACK_COLORS_HEX[e._track]||'#888';
    const title=e.summary||'';
    for(const [k,t] of Object.entries(TRACKS)){
      if(title.toLowerCase().includes(t.label.toLowerCase().split(' ')[0].toLowerCase())) return TRACK_COLORS_HEX[k];
    }
    return e._calendarColor||'#555';
  }

  function fmtHour(h) {
    if(h===0) return '12am'; if(h===12) return '12pm';
    return h>12?`${h-12}pm`:`${h}am`;
  }

  // Overlap layout — returns col index per event and total cols
  function layoutEvents(events) {
    const sorted=[...events].sort((a,b)=>{
      const at=a.start?.dateTime?new Date(a.start.dateTime).getTime():0;
      const bt=b.start?.dateTime?new Date(b.start.dateTime).getTime():0;
      return at-bt;
    });
    const cols=[], result=new Map();
    for(const ev of sorted){
      const es=ev.start?.dateTime?new Date(ev.start.dateTime).getTime():0;
      const ee=ev.end?.dateTime?new Date(ev.end.dateTime).getTime():es+3600000;
      let placed=false;
      for(let ci=0;ci<cols.length;ci++){
        const last=cols[ci][cols[ci].length-1];
        const ls=last.start?.dateTime?new Date(last.start.dateTime).getTime():0;
        const le=last.end?.dateTime?new Date(last.end.dateTime).getTime():ls+3600000;
        if(es>=le){cols[ci].push(ev);result.set(ev,ci);placed=true;break;}
      }
      if(!placed){cols.push([ev]);result.set(ev,cols.length-1);}
    }
    return {layout:result,totalCols:Math.max(cols.length,1)};
  }

  // MONTH VIEW
  function MonthView() {
    const year=current.getFullYear(),month=current.getMonth();
    const firstDay=getFirstDayOfMonth(year,month),daysInMonth=getDaysInMonth(year,month);
    const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const cells=[];
    for(let i=0;i<firstDay;i++){const d=new Date(year,month,-(firstDay-i-1));cells.push({date:d,otherMonth:true});}
    for(let i=1;i<=daysInMonth;i++) cells.push({date:new Date(year,month,i),otherMonth:false});
    while(cells.length%7!==0){const last=cells[cells.length-1].date;cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),otherMonth:true});}
    return (
      <div className="cal-month-grid">
        {dayNames.map(d=><div key={d} className="cal-day-header">{d}</div>)}
        {cells.map((cell,i)=>{
          const evs=eventsForDay(cell.date),isToday=isSameDay(cell.date,today);
          return (
            <div key={i} className={`cal-day${cell.otherMonth?' other-month':''}${isToday?' today':''}`}>
              <div className="cal-day-num">{cell.date.getDate()}</div>
              <div className="cal-day-add" onClick={e=>{e.stopPropagation();setAddEventDate(new Date(cell.date));}}>+</div>
              {evs.slice(0,3).map((e,j)=>(
                <div key={j} className="cal-event-pill" onClick={ev=>{ev.stopPropagation();setEditEvent(e);}}
                  style={{background:eventColor(e)+'22',color:eventColor(e),border:`1px solid ${eventColor(e)}44`,cursor:'pointer'}}
                  title={`${e.summary}${e._calendarName?' ('+e._calendarName+')':''}`}>
                  {e.start?.dateTime?fmtTime(new Date(e.start.dateTime))+' ':''}{e.summary}
                </div>
              ))}
              {evs.length>3&&<div style={{fontSize:'9px',color:'var(--text3)',cursor:'pointer'}}
                onClick={()=>{setCurrent(new Date(cell.date));setView('day');}}>+{evs.length-3} more</div>}
            </div>
          );
        })}
      </div>
    );
  }

  // WEEK VIEW — absolute positioned events with overlap stagger
  function WeekView() {
    const startOfWeek=new Date(current),day=startOfWeek.getDay();
    startOfWeek.setDate(startOfWeek.getDate()-day+(day===0?-6:1));
    const days=Array.from({length:7},(_,i)=>{const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);return d;});
    const CELL_H=48;
    return (
      <div style={{overflowX:'auto',overflowY:'auto',maxHeight:'80vh'}}>
        <div style={{position:'relative',minWidth:'700px'}}>
          {/* Sticky header */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',position:'sticky',top:0,zIndex:20,background:'var(--bg)'}}>
            <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',height:'48px'}}></div>
            {days.map((d,i)=>(
              <div key={i} className={`cal-week-header${isSameDay(d,today)?' today-col':''}`} style={{borderRight:'1px solid var(--border)'}}>
                <div className="cal-week-header-day">{d.toLocaleDateString('en-US',{weekday:'short'})}</div>
                <div className="cal-week-header-date" style={{color:isSameDay(d,today)?'var(--accent)':'var(--text3)'}}>{d.getDate()}</div>
              </div>
            ))}
          </div>
          {/* Hour grid */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',minWidth:'700px'}}>
            {HOURS.map(hour=>(
              <React.Fragment key={hour}>
                <div className="cal-hour-label" style={{height:`${CELL_H}px`,display:'flex',alignItems:'flex-start',paddingTop:'4px',justifyContent:'flex-end',paddingRight:'8px',fontSize:'9px',color:'var(--text3)'}}>{fmtHour(hour)}</div>
                {days.map((d,di)=>(
                  <div key={di} className={`cal-week-cell${isSameDay(d,today)?' today-col':''}`}
                    style={{height:`${CELL_H}px`}}
                    onClick={()=>{const nd=new Date(d);nd.setHours(hour,0,0,0);setAddEventDate(nd);}}>
                  </div>
                ))}
              </React.Fragment>
            ))}
          </div>
          {/* Overlay events */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',minWidth:'700px',position:'absolute',top:'48px',left:0,right:0,height:`${CELL_H*24}px`,pointerEvents:'none'}}>
            <div></div>
            {days.map((d,di)=>{
              const dayEvs=eventsForDay(d).filter(e=>e.start?.dateTime);
              const {layout,totalCols}=layoutEvents(dayEvs);
              return (
                <div key={di} style={{position:'relative',height:`${CELL_H*24}px`,pointerEvents:'auto'}}>
                  {dayEvs.map((e,j)=>{
                    const es=new Date(e.start.dateTime);
                    const ee=e.end?.dateTime?new Date(e.end.dateTime):new Date(es.getTime()+3600000);
                    const top=(es.getHours()+es.getMinutes()/60)*CELL_H;
                    const height=Math.max(((ee-es)/3600000)*CELL_H,18);
                    const col=layout.get(e)||0;
                    const w=totalCols>1?`${88/totalCols}%`:'90%';
                    const left=totalCols>1?`${col*(88/totalCols)+2}%`:'4%';
                    const color=eventColor(e);
                    return (
                      <div key={j} onClick={()=>setEditEvent(e)}
                        style={{position:'absolute',top:`${top}px`,height:`${height}px`,left,width:w,
                          background:color+'33',color,border:`1px solid ${color}66`,
                          fontSize:'9px',padding:'2px 4px',overflow:'hidden',cursor:'pointer',
                          zIndex:10+col,boxSizing:'border-box',transition:'opacity 0.1s'}}
                        title={`${e.summary} (${fmtTime(es)}–${fmtTime(ee)})${e._calendarName?' · '+e._calendarName:''}`}
                        onMouseEnter={ev=>ev.currentTarget.style.opacity='0.75'}
                        onMouseLeave={ev=>ev.currentTarget.style.opacity='1'}>
                        <div style={{fontWeight:'600',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.summary}</div>
                        <div style={{opacity:0.8}}>{fmtTime(es)}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // DAY VIEW — absolute positioned with overlap stagger
  function DayView() {
    const dayEvs=eventsForDay(current);
    const timedEvs=dayEvs.filter(e=>e.start?.dateTime);
    const allDayEvs=dayEvs.filter(e=>!e.start?.dateTime&&e.start?.date);
    const {layout,totalCols}=layoutEvents(timedEvs);
    const CELL_H=56;
    return (
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 0 16px',borderBottom:'1px solid var(--border)',marginBottom:'8px'}}>
          <span style={{fontFamily:'Syne,sans-serif',fontSize:'18px',fontWeight:'700'}}>
            {current.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
          </span>
          <button className="btn-sm" onClick={()=>setAddEventDate(new Date(current))}>+ Add Event</button>
        </div>
        {allDayEvs.length>0&&(
          <div style={{marginBottom:'12px'}}>
            <div style={{fontSize:'10px',color:'var(--text3)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'6px'}}>All Day</div>
            {allDayEvs.map((e,i)=>(
              <div key={i} onClick={()=>setEditEvent(e)} style={{background:eventColor(e)+'22',color:eventColor(e),border:`1px solid ${eventColor(e)}44`,padding:'6px 10px',marginBottom:'4px',fontSize:'12px',cursor:'pointer'}}>
                {e.summary}
              </div>
            ))}
          </div>
        )}
        <div style={{position:'relative',overflowY:'auto',maxHeight:'75vh'}}>
          {HOURS.map(h=>(
            <div key={h} style={{display:'grid',gridTemplateColumns:'52px 1fr',height:`${CELL_H}px`,borderBottom:'1px solid var(--border)'}}>
              <div style={{fontSize:'9px',color:'var(--text3)',textAlign:'right',paddingRight:'8px',paddingTop:'4px',background:'var(--surface)',borderRight:'1px solid var(--border)'}}>{fmtHour(h)}</div>
              <div style={{cursor:'pointer',position:'relative'}} onClick={()=>{const nd=new Date(current);nd.setHours(h,0,0,0);setAddEventDate(nd);}}></div>
            </div>
          ))}
          {/* Overlay */}
          <div style={{position:'absolute',top:0,left:'52px',right:0,bottom:0,pointerEvents:'none'}}>
            {timedEvs.map((e,j)=>{
              const es=new Date(e.start.dateTime);
              const ee=e.end?.dateTime?new Date(e.end.dateTime):new Date(es.getTime()+3600000);
              const top=(es.getHours()+es.getMinutes()/60)*CELL_H;
              const height=Math.max(((ee-es)/3600000)*CELL_H,24);
              const col=layout.get(e)||0;
              const w=totalCols>1?`${94/totalCols}%`:'96%';
              const left=totalCols>1?`${col*(94/totalCols)+1}%`:'1%';
              const color=eventColor(e);
              return (
                <div key={j} onClick={()=>setEditEvent(e)}
                  style={{position:'absolute',top:`${top}px`,height:`${height}px`,left,width:w,
                    background:color+'33',color,border:`1px solid ${color}77`,
                    padding:'4px 8px',fontSize:'11px',cursor:'pointer',overflow:'hidden',
                    pointerEvents:'auto',zIndex:10+col,boxSizing:'border-box',transition:'opacity 0.1s'}}
                  onMouseEnter={ev=>ev.currentTarget.style.opacity='0.75'}
                  onMouseLeave={ev=>ev.currentTarget.style.opacity='1'}>
                  <div style={{fontWeight:'600'}}>{e.summary}</div>
                  <div style={{fontSize:'10px',opacity:0.8}}>{fmtTime(es)} → {fmtTime(ee)}</div>
                  {e._calendarName&&<div style={{fontSize:'9px',opacity:0.6}}>{e._calendarName}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  function navigate(dir) {
    const d=new Date(current);
    if(view==='month') d.setMonth(d.getMonth()+dir);
    else if(view==='week') d.setDate(d.getDate()+dir*7);
    else d.setDate(d.getDate()+dir);
    setCurrent(d);
  }

  function getLabel() {
    if(view==='month') return current.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if(view==='day') return current.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const s=new Date(current),day=s.getDay();
    s.setDate(s.getDate()-day+(day===0?-6:1));
    const e=new Date(s);e.setDate(s.getDate()+6);
    return `${s.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  }

  return (
    <div className="page" style={{paddingBottom:'60px'}}>
      <div className="cal-toolbar">
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={()=>navigate(-1)}>←</button>
          <div className="cal-month-label">{getLabel()}</div>
          <button className="cal-nav-btn" onClick={()=>navigate(1)}>→</button>
          <button className="cal-nav-btn" onClick={()=>setCurrent(new Date())}>Today</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <button className="btn-sm" onClick={()=>setAddEventDate(new Date())}>+ Add Event</button>
          <div className="cal-view-toggle">
            {['month','week','day'].map(v=>(
              <button key={v} className={`cal-view-btn${view===v?' active':''}`} onClick={()=>setView(v)}>{v}</button>
            ))}
          </div>
        </div>
      </div>
      {demoMode&&(
        <div style={{background:'rgba(255,179,71,0.08)',border:'1px solid rgba(255,179,71,0.2)',padding:'10px 14px',marginBottom:'16px',fontSize:'11px',color:'var(--warning)'}}>
          Demo mode — connect Google to see your real calendar events
        </div>
      )}
      {view==='month'&&<MonthView/>}
      {view==='week'&&<WeekView/>}
      {view==='day'&&<DayView/>}
      {addEventDate&&(
        <AddEventModal date={addEventDate} calendarList={calendarList} onClose={()=>setAddEventDate(null)}
          onAdd={async ev=>{await onAddEvent(ev);setAddEventDate(null);}}/>
      )}
      {editEvent&&(
        <EditEventModal event={editEvent} onClose={()=>setEditEvent(null)}
          onSave={async ev=>{await onEditEvent(ev);setEditEvent(null);}}
          onDelete={async ev=>{await onDeleteEvent(ev);setEditEvent(null);}}/>
      )}
    </div>
  );
}
// ── CHECK-IN PAGE ─────────────────────────────────────────────────────────────
function CheckInPage({ items, calEvents, goals, onGoalChange, onGoalBlur, onSave, onTasksGenerated, demoMode }) {
  const [aiState, setAiState]   = useState({});
  const [aiTasks, setAiTasks]   = useState({});
  const [aiSlots, setAiSlots]   = useState({});
  const [savedState, setSavedState] = useState({});
  const [savingTrack, setSavingTrack] = useState(null);
  const [selectedTasks, setSelectedTasks] = useState({}); // track -> Set of selected indices

  const prompts = {
    records:   'What do you want to move forward? How does it connect to revenue?',
    publishing:"What is the publishing priority this week?",
    songstage: "Where does the product stand? What is the win this week?",
    freelance: "What is booked? Who do you need to reach out to?",
    content:   'What are you publishing? (target: 2-3 short-form, 1 long-form, 1 Substack)',
  };

  useEffect(() => {
    const states = {};
    Object.keys(TRACKS).forEach(track => {
      states[track] = goals[track]?.trim() ? 'saved' : 'empty';
    });
    setSavedState(states);
  }, []);

  async function handleBlur(track) {
    const val = goals[track];
    if (!val?.trim()) { setSavedState(s=>({...s,[track]:'empty'})); return; }
    setSavingTrack(track);
    await onGoalBlur(track, val);
    setSavedState(s=>({...s,[track]:'saved'}));
    setSavingTrack(null);
  }

  function handleChange(track, val) {
    onGoalChange(track, val);
    setSavedState(s=>({...s,[track]: val.trim() ? 'draft' : 'empty'}));
  }

  async function breakdown(track) {
    const goal = goals[track];
    if (!goal?.trim()) return;
    setAiState(s=>({...s,[track]:'loading'}));
    try {
      const tasks = await breakdownGoalWithAI(track, goal, items[track]||[]);
      if (!tasks || tasks.length === 0) {
        setAiState(s=>({...s,[track]:'error',[track+'_err']:'No tasks returned'}));
        return;
      }
      const bookedSlots = [], taskSlots = {};
      for (let i=0; i<tasks.length; i++) {
        const duration = tasks[i].estimatedHours || 1;
        const fakeBooked = bookedSlots.map(s=>({ start:{dateTime:s.startISO}, end:{dateTime:s.endISO}, summary:'[HQ] Reserved' }));
        const available = getSmartSlots(track, [...calEvents, ...fakeBooked], duration);
        if (available.length > 0) { taskSlots[i] = available[0]; bookedSlots.push(available[0]); }
      }
      setAiTasks(t=>({...t,[track]:tasks}));
      setAiSlots(s=>({...s,[track]:taskSlots}));
      setAiState(s=>({...s,[track]:'done'}));
      // Select all tasks by default
      setSelectedTasks(st=>({...st,[track]:new Set(tasks.map((_,i)=>i))}));
    } catch(e) {
      setAiState(s=>({...s,[track]:'error',[track+'_err']:e.message||String(e)}));
    }
  }

  function addTasksToTrack(track) {
    const allTasks = aiTasks[track]||[];
    const allSlots = aiSlots[track]||{};
    const selected = selectedTasks[track] || new Set(allTasks.map((_,i)=>i));
    // Filter to only selected tasks, remap slots to new indices
    const filteredTasks = [], filteredSlots = {};
    allTasks.forEach((task, i) => {
      if (selected.has(i)) {
        const newIdx = filteredTasks.length;
        filteredTasks.push(task);
        if (allSlots[i]) filteredSlots[newIdx] = allSlots[i];
      }
    });
    onTasksGenerated(track, filteredTasks, filteredSlots);
    setAiState(s=>({...s,[track]:'idle'}));
    setAiTasks(t=>({...t,[track]:[]}));
    setAiSlots(s=>({...s,[track]:{}}));
    setSelectedTasks(st=>({...st,[track]:new Set()}));
  }

  const staleByTrack = {};
  Object.entries(items).forEach(([track,trackItems])=>{
    staleByTrack[track]=trackItems.filter(i=>i.status!==TERMINAL[track]&&daysSince(i.dateAdded)>5);
  });

  const thisWeekEvents = calEvents.filter(e=>{
    const start = e.start?.dateTime?new Date(e.start.dateTime):null;
    if (!start) return false;
    const now=new Date(), weekEnd=new Date(); weekEnd.setDate(now.getDate()+7);
    return start>=now&&start<=weekEnd;
  }).slice(0,5);

  const allSaved = Object.keys(TRACKS).every(t => savedState[t]==='saved');
  const anySaved = Object.keys(TRACKS).some(t => savedState[t]==='saved');

  function stateColor(state) {
    if (state==='saved') return 'var(--success)';
    if (state==='draft') return 'var(--warning)';
    return 'transparent';
  }

  function stateLabel(state, saving) {
    if (saving) return 'Saving...';
    if (state==='saved') return '✓ Saved';
    if (state==='draft') return '● Unsaved';
    return '';
  }

  return (
    <div className="page">
      <div className="checkin-wrap">
        <div className="checkin-intro">
          <div className="checkin-intro-title">Monday Check-In</div>
          <div className="checkin-intro-sub">
            Goals auto-save when you click out of each field. Lock in when ready to commit and block your calendar.
          </div>
        </div>

        {thisWeekEvents.length>0&&(
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'10px'}}>Already on your calendar this week</div>
            {thisWeekEvents.map((e,i)=>(
              <div key={i} style={{display:'flex',gap:'12px',fontSize:'12px',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{color:'var(--text3)',minWidth:'140px',fontSize:'10px'}}>
                  {e.start?.dateTime?`${fmtDate(new Date(e.start.dateTime))} ${fmtTime(new Date(e.start.dateTime))}`:'All day'}
                </div>
                <div>{e.summary}</div>
              </div>
            ))}
          </div>
        )}

        {Object.entries(TRACKS).map(([track,t])=>{
          const state = savedState[track]||'empty';
          const saving = savingTrack===track;
          return (
            <div key={track} className={"checkin-section "+track} style={{marginBottom:'12px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}>
                <div className="checkin-section-title" style={{color:t.color}}>{t.label}</div>
                <div style={{fontSize:'10px',color:stateColor(state),transition:'color 0.3s',fontFamily:'DM Mono,monospace'}}>
                  {stateLabel(state, saving)}
                </div>
              </div>
              <div className="checkin-section-sub">{prompts[track]}</div>

              {staleByTrack[track]?.length>0&&(
                <div className="stale-prompt">
                  Sitting 5+ days: {staleByTrack[track].map(i=>i.name).join(', ')}
                </div>
              )}

              <textarea
                className="form-textarea form-input"
                style={{
                  marginBottom:'10px',
                  borderColor: state==='saved'?'rgba(77,255,145,0.35)': state==='draft'?'rgba(255,179,71,0.35)':'var(--border)',
                  transition:'border-color 0.3s',
                }}
                placeholder={"What's the goal for "+t.label+" this week?"}
                value={goals[track]||''}
                onChange={e=>handleChange(track,e.target.value)}
                onBlur={()=>handleBlur(track)}
              />

              {goals[track]?.trim()&&(
                <div>
                  {(!aiState[track]||aiState[track]==='idle')&&(
                    <button className="btn-sm" onClick={()=>breakdown(track)}>Break into tasks with AI</button>
                  )}
                  {aiState[track]==='loading'&&(
                    <div className="ai-thinking"><div className="ai-dot"/> Breaking down your goal...</div>
                  )}
                  {aiState[track]==='error'&&(
                    <div style={{background:'rgba(255,68,68,0.08)',border:'1px solid rgba(255,68,68,0.3)',padding:'10px 12px',fontSize:'11px',color:'#ff6666',marginBottom:'8px'}}>
                      {aiState[track+'_err']||'Unknown error'}
                      <button className="btn-sm" style={{marginLeft:'10px'}} onClick={()=>setAiState(s=>({...s,[track]:'idle'}))}>Retry</button>
                    </div>
                  )}
                  {aiState[track]==='done'&&aiTasks[track]?.length>0&&(
                    <div>
                      {/* Select all toggle */}
                      {(() => {
                        const sel = selectedTasks[track] || new Set(aiTasks[track].map((_,i)=>i));
                        const allSelected = aiTasks[track].every((_,i)=>sel.has(i));
                        const selCount = sel.size;
                        return (
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',paddingBottom:'8px',borderBottom:'1px solid var(--border)'}}>
                            <div style={{fontSize:'10px',color:'var(--text2)'}}>
                              {selCount} of {aiTasks[track].length} selected
                            </div>
                            <button className="btn-sm" onClick={()=>{
                              if (allSelected) {
                                setSelectedTasks(st=>({...st,[track]:new Set()}));
                              } else {
                                setSelectedTasks(st=>({...st,[track]:new Set(aiTasks[track].map((_,i)=>i))}));
                              }
                            }}>
                              {allSelected ? 'Deselect all' : 'Select all'}
                            </button>
                          </div>
                        );
                      })()}

                      <div className="ai-tasks">
                        {aiTasks[track].map((task,i)=>{
                          const slot = aiSlots[track]?.[i];
                          const sel = selectedTasks[track] || new Set(aiTasks[track].map((_,i)=>i));
                          const isSelected = sel.has(i);
                          return (
                            <div key={i} className="ai-task" style={{opacity: isSelected?1:0.45, transition:'opacity 0.15s'}}>
                              {/* Checkbox + name row */}
                              <div style={{display:'flex',alignItems:'flex-start',gap:'10px'}}>
                                <div
                                  onClick={()=>{
                                    setSelectedTasks(st=>{
                                      const current = new Set(st[track] || aiTasks[track].map((_,i)=>i));
                                      if (current.has(i)) current.delete(i); else current.add(i);
                                      return {...st,[track]:new Set(current)};
                                    });
                                  }}
                                  style={{
                                    width:'16px',height:'16px',flexShrink:0,marginTop:'2px',
                                    border:`1px solid ${isSelected?'var(--accent)':'var(--border)'}`,
                                    background: isSelected?'var(--accent)':'transparent',
                                    cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                                    fontSize:'10px',color:'#000',transition:'all 0.15s',
                                  }}>
                                  {isSelected&&'✓'}
                                </div>
                                <div style={{flex:1}}>
                                  <div className="ai-task-name">{task.name}</div>
                                  <div className="ai-task-meta">{task.status} · ~{task.estimatedHours}h · {task.notes}</div>
                                  {isSelected&&(slot?(
                                    <div style={{marginTop:'6px',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                                      <div style={{fontSize:'10px',color:'var(--accent)',background:'rgba(232,255,71,0.08)',border:'1px solid rgba(232,255,71,0.2)',padding:'3px 8px'}}>
                                        {slot.label}
                                      </div>
                                      <select style={{fontFamily:'DM Mono,monospace',fontSize:'9px',background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text2)',padding:'3px 6px',cursor:'pointer'}}
                                        onChange={ev=>{
                                          const idx=parseInt(ev.target.value);
                                          const allSlots=getSmartSlots(track,calEvents,task.estimatedHours||1);
                                          if(idx>=0&&allSlots[idx]) setAiSlots(s=>({...s,[track]:{...s[track],[i]:allSlots[idx]}}));
                                        }}>
                                        <option value={-1}>Change slot...</option>
                                        {getSmartSlots(track,calEvents,task.estimatedHours||1).slice(0,5).map((s,si)=>(
                                          <option key={si} value={si}>{s.label}</option>
                                        ))}
                                      </select>
                                    </div>
                                  ):(
                                    <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'4px'}}>No available slot found</div>
                                  ))}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* Action buttons */}
                      {(() => {
                        const sel = selectedTasks[track] || new Set(aiTasks[track].map((_,i)=>i));
                        const selCount = sel.size;
                        return (
                          <div style={{display:'flex',gap:'8px',marginTop:'12px',flexWrap:'wrap'}}>
                            <button className="btn-primary" style={{fontSize:'11px',padding:'7px 14px'}}
                              onClick={()=>addTasksToTrack(track)}
                              disabled={selCount===0}>
                              Add {selCount} task{selCount!==1?'s':''}{selCount>0?' + block calendar':''}
                            </button>
                            <button className="btn-secondary" style={{fontSize:'11px',padding:'7px 14px'}}
                              onClick={()=>{setAiState(s=>({...s,[track]:'idle'}));setSelectedTasks(st=>({...st,[track]:new Set()}));}}>
                              Dismiss
                            </button>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {anySaved&&(
          <div style={{marginTop:'8px',padding:'20px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'3px solid var(--accent)'}}>
            <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'12px'}}>
              {allSaved?'All goals saved — ready to lock in your week':'Some goals saved. Lock in now or keep filling in the rest.'}
            </div>
            <button className="btn-primary" style={{width:'100%',padding:'14px'}} onClick={onSave}>
              Lock In This Week
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


// ── DUE SOON SECTION ─────────────────────────────────────────────────────────
function DueSoonSection({ items, now, onMarkDone, onEdit }) {
  const [expanded, setExpanded] = useState(null);
  const [editItem, setEditItem] = useState(null);
  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'3px solid var(--warning)',padding:'20px',marginBottom:'24px'}}>
      <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--warning)',marginBottom:'14px'}}>
        Due in the next 14 days
      </div>
      {items.map((item,i)=>{
        const d=new Date(item.dueDate+'T12:00:00');
        const isOverdue=d<now;
        const daysLeft=Math.ceil((d-now)/86400000);
        const isExpanded=expanded===i;
        return (
          <div key={i} style={{borderBottom:'1px solid var(--border)'}}>
            <div onClick={()=>setExpanded(isExpanded?null:i)}
              style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',fontSize:'12px',cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px',flex:1}}>
                <div className="nav-dot" style={{background:TRACKS[item.track]?.color||'var(--text3)',flexShrink:0}}/>
                <div>
                  <div style={{fontWeight:'500'}}>{item.name}</div>
                  <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}}>
                    {TRACKS[item.track]?.label} · {item.status}
                    {item.owner&&<span style={{color:'var(--freelance)',marginLeft:'8px'}}>👤 {item.owner}</span>}
                  </div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'10px',flexShrink:0}}>
                <span style={{fontSize:'10px',fontFamily:'DM Mono,monospace',color:isOverdue?'#ff4444':daysLeft<=3?'var(--warning)':'var(--text2)'}}>
                  {isOverdue?`${Math.abs(daysLeft)}d overdue`:daysLeft===0?'Today':daysLeft===1?'Tomorrow':`${daysLeft}d`}
                </span>
                <span style={{fontSize:'10px',color:'var(--text3)'}}>{d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                <span style={{fontSize:'10px',color:'var(--text3)',display:'inline-block',transform:isExpanded?'rotate(180deg)':'none',transition:'transform 0.15s'}}>▾</span>
              </div>
            </div>
            {isExpanded&&(
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'14px',marginBottom:'8px'}}>
                {item.notes&&<div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'12px',lineHeight:'1.5'}}>{item.notes}</div>}
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  <button className="btn-primary" style={{fontSize:'11px',padding:'6px 14px'}}
                    onClick={()=>{onMarkDone(item.track,item);setExpanded(null);}}>
                    ✓ Mark Done
                  </button>
                  <button className="btn-secondary" style={{fontSize:'11px',padding:'6px 14px'}}
                    onClick={()=>setEditItem(item)}>
                    ✎ Edit
                  </button>
                  <button className="btn-secondary" style={{fontSize:'11px',padding:'6px 14px'}}
                    onClick={()=>setExpanded(null)}>
                    Close
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      })}
      {editItem&&(
        <EditCardModal item={editItem} track={editItem.track}
          onClose={()=>setEditItem(null)}
          onSave={newItem=>{onEdit(editItem.track,editItem,newItem);setEditItem(null);setExpanded(null);}}
          onDelete={item=>{onMarkDone(item.track,item);setEditItem(null);}}/>
      )}
    </div>
  );
}

// ── DASHBOARD PAGE ────────────────────────────────────────────────────────────
function DashboardPage({ items, goals, calEvents, newWeek, onCheckIn, onAddToWeek, onMarkDone, onEdit }) {
  const today = new Date();
  const isMonday = today.getDay() === 1;
  const allItems = Object.values(items).flat();
  const stale = allItems.filter(i=>i.status!==TERMINAL[i.track]&&daysSince(i.dateAdded)>7);
  const weekGoals = Object.entries(goals).filter(([,v])=>v);

  // Due soon — items with due dates in the next 14 days, not yet done
  const now = new Date();
  const twoWeeks = new Date(now); twoWeeks.setDate(now.getDate()+14);
  const dueSoon = allItems.filter(i => {
    if (!i.dueDate) return false;
    const doneStats = DONE_STATUSES[i.track] || [];
    if (doneStats.includes(i.status)) return false;
    const d = new Date(i.dueDate + 'T12:00:00');
    return !isNaN(d.getTime()) && d <= twoWeeks;
  }).sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));

  // Completion stats
  const totalCompleted = allItems.filter(i => (DONE_STATUSES[i.track]||[]).includes(i.status)).length;
  const activeItems = allItems.filter(i => !(DONE_STATUSES[i.track]||[]).includes(i.status)).length;
  // This week = items added this week that are done (approximation until we have completedDate)
  const weekStart = new Date(now);
  const dayOfWeek = weekStart.getDay();
  weekStart.setDate(weekStart.getDate() - dayOfWeek + (dayOfWeek===0?-6:1));
  weekStart.setHours(0,0,0,0);
  const completedThisWeek = allItems.filter(i =>
    (DONE_STATUSES[i.track]||[]).includes(i.status) &&
    i.dateAdded && new Date(i.dateAdded) >= weekStart
  ).length;

  const thisWeekEvents = calEvents.filter(e=>{
    const start = e.start?.dateTime?new Date(e.start.dateTime):null;
    if (!start) return false;
    const now=new Date(), end=new Date(); end.setDate(now.getDate()+7);
    return start>=now&&start<=end;
  }).slice(0,6);

  return (
    <div className="page">
      <div style={{marginBottom:'28px'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:'28px',fontWeight:'800',marginBottom:'4px'}}>Command Center</div>
        <div style={{fontSize:'11px',color:'var(--text2)'}}>{getWeekLabel()} · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>

      {dueSoon.length>0&&<DueSoonSection items={dueSoon} now={now} onMarkDone={onMarkDone} onEdit={onEdit}/>}

      {(newWeek||(isMonday&&weekGoals.length===0))&&(
        <div style={{background:'rgba(232,255,71,0.06)',border:'1px solid rgba(232,255,71,0.3)',borderLeft:'3px solid var(--accent)',padding:'16px 20px',marginBottom:'24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
          <div>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:'15px',fontWeight:'700',color:'var(--accent)',marginBottom:'3px'}}>
              {isMonday?'New week — time to check in':'No goals set for this week yet'}
            </div>
            <div style={{fontSize:'11px',color:'var(--text2)'}}>Set your goals, review stale items, and block your time.</div>
          </div>
          <button className="add-btn" onClick={onCheckIn}>Start Check-In</button>
        </div>
      )}

      <div className="dashboard-grid">
        {Object.entries(TRACKS).map(([key,t])=>{
          const trackItems=items[key]||[];
          const doneStats = DONE_STATUSES[key]||[];
          const active=trackItems.filter(i=>!doneStats.includes(i.status)).length;
          const done=trackItems.filter(i=>doneStats.includes(i.status)).length;
          return (
            <div key={key} className={`stat-card ${key}`}>
              <div className="stat-label">{t.label}</div>
              <div className="stat-number" style={{color:t.color}}>{active}</div>
              <div className="stat-sub">active · <span style={{color:'var(--success)'}}>{done} done</span></div>
            </div>
          );
        })}
        <div className="stat-card hours">
          <div className="stat-label">Weekly Targets</div>
          <div style={{fontSize:'12px',lineHeight:'2'}}>
            <span style={{color:'var(--records)'}}>Real Fun: 10–15h</span><br/>
            <span style={{color:'var(--songstage)'}}>Songstage: 15–20h</span><br/>
            <span style={{color:'var(--freelance)'}}>Freelance: ~10h</span>
          </div>
        </div>
      </div>

      {/* Completion stats bar */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',padding:'16px 20px',marginBottom:'24px',display:'flex',alignItems:'center',gap:'32px',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'4px'}}>Total Completed</div>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:'28px',fontWeight:'800',color:'var(--success)'}}>{totalCompleted}</div>
        </div>
        <div style={{width:'1px',height:'40px',background:'var(--border)'}}/>
        <div>
          <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'4px'}}>This Week</div>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:'28px',fontWeight:'800',color:'var(--accent)'}}>{completedThisWeek}</div>
        </div>
        <div style={{width:'1px',height:'40px',background:'var(--border)'}}/>
        <div>
          <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'4px'}}>Still Active</div>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:'28px',fontWeight:'800',color:'var(--text2)'}}>{activeItems}</div>
        </div>
        <div style={{flex:1,minWidth:'120px'}}>
          <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'6px'}}>
            Overall Progress
          </div>
          <div style={{height:'4px',background:'var(--border)',borderRadius:'2px',overflow:'hidden'}}>
            <div style={{
              height:'100%',
              width:`${totalCompleted+activeItems>0?Math.round(totalCompleted/(totalCompleted+activeItems)*100):0}%`,
              background:'var(--success)',
              transition:'width 0.5s ease',
            }}/>
          </div>
          <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'4px'}}>
            {totalCompleted+activeItems>0?Math.round(totalCompleted/(totalCompleted+activeItems)*100):0}% done
          </div>
        </div>
      </div>

      {stale.length>0&&(
        <div className="stale-section">
          <div className="stale-title">⚠ Sitting &gt; 7 Days</div>
          {stale.slice(0,5).map((item,i)=>(
            <div key={i} className="stale-item">
              <div className="stale-item-left">
                <div className="nav-dot" style={{background:TRACKS[item.track].color}}/>
                <span>{item.name}</span>
                <span className="tag" style={{marginLeft:'6px'}}>{item.status}</span>
                <span className="stale-days">{daysSince(item.dateAdded)}d</span>
              </div>
              <button className="btn-sm" onClick={()=>onAddToWeek(item)}>+ This week</button>
            </div>
          ))}
        </div>
      )}

      {weekGoals.length>0&&(
        <div style={{marginBottom:'24px'}}>
          <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'12px'}}>This Week's Goals</div>
          {weekGoals.map(([track,goal])=>(
            <div key={track} className="goal-card">
              <div className="goal-track-name" style={{color:TRACKS[track].color}}>{TRACKS[track].label}</div>
              <div className="goal-text">{goal}</div>
            </div>
          ))}
        </div>
      )}

      {thisWeekEvents.length>0&&(
        <div>
          <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'12px'}}>This Week's Calendar</div>
          {thisWeekEvents.map((e,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:'16px',padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:'12px'}}>
              <div style={{color:'var(--text3)',fontSize:'10px',minWidth:'140px'}}>
                {e.start?.dateTime
                  ? `${fmtDate(new Date(e.start.dateTime))} ${fmtTime(new Date(e.start.dateTime))}`
                  : 'All day'}
              </div>
              <div style={{flex:1}}>{e.summary}</div>
              {e.end?.dateTime&&<div style={{color:'var(--text3)',fontSize:'10px'}}>→ {fmtTime(new Date(e.end.dateTime))}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  family: 'Family',

  wind:   'Wind Down',
};

function todayKey() { return new Date().toISOString().split('T')[0]; }

function loadPersonalTasks() {
  try {
    const saved = localStorage.getItem('hq_personal_tasks');
    return saved ? JSON.parse(saved) : DEFAULT_PERSONAL_TASKS;
  } catch { return DEFAULT_PERSONAL_TASKS; }
}

function savePersonalTasks(tasks) {
  try { localStorage.setItem('hq_personal_tasks', JSON.stringify(tasks)); } catch {}
}

function loadPersonalChecked() {
  try {
    const saved = localStorage.getItem('hq_personal_' + todayKey());
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
}

function savePersonalChecked(checked) {
  try { localStorage.setItem('hq_personal_' + todayKey(), JSON.stringify(checked)); } catch {}
}

function loadStreaks() {
  try {
    const saved = localStorage.getItem('hq_streaks');
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
}

function updateStreaks(checkedToday, personalTasks) {
  const streaks = loadStreaks();
  const today = todayKey();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yesterdayKey = yesterday.toISOString().split('T')[0];

  personalTasks.filter(t=>t.active).forEach(task => {
    const existing = streaks[task.id] || { count:0, lastDate:'' };
    if (checkedToday[task.id]) {
      if (existing.lastDate === today) return; // already counted
      const continued = existing.lastDate === yesterdayKey;
      streaks[task.id] = { count: continued ? existing.count+1 : 1, lastDate: today };
    }
  });

  try { localStorage.setItem('hq_streaks', JSON.stringify(streaks)); } catch {}
  return streaks;
}

function loadShutdownLog() {
  try {
    const saved = localStorage.getItem('hq_shutdown_' + todayKey());
    return saved ? JSON.parse(saved) : null;
  } catch { return null; }
}

function saveShutdownLog(log) {
  try { localStorage.setItem('hq_shutdown_' + todayKey(), JSON.stringify(log)); } catch {}
}

// ── CREATURE GAME ─────────────────────────────────────────────────────────────
function CreatureGame({ openItems, onAllSorted }) {
  const containerRef = React.useRef(null);
  const animRef = React.useRef(null);
  const dragRef = React.useRef(null); // { key, offsetX, offsetY }
  const posRef = React.useRef({});    // live positions, not in state to avoid re-render during drag
  const timeRef = React.useRef(0);

  const [sorted, setSorted] = React.useState({});
  const [dragging, setDragging] = React.useState(null); // key being dragged
  const [hoverBucket, setHoverBucket] = React.useState(null); // 'tomorrow'|'drop'|null
  const [poofs, setPoofs] = React.useState([]);
  const [, forceRender] = React.useReducer(x => x+1, 0);

  // Creature personality — each gets a fixed phase/speed so idle is consistent
  const personalities = React.useRef({});

  // Init positions
  React.useEffect(() => {
    const cols = Math.min(4, openItems.length);
    openItems.forEach((item, i) => {
      const key = `${item.track}::${item.id}`;
      if (posRef.current[key]) return; // don't re-init
      const col = i % cols;
      const row = Math.floor(i / cols);
      const baseX = 130 + col * 80 + (row % 2) * 20;
      const baseY = 30 + row * 85;
      posRef.current[key] = { x: baseX, y: baseY, baseX, baseY };
      personalities.current[key] = {
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 0.6,
        bobAmp: 3 + Math.random() * 4,
        swayAmp: 2 + Math.random() * 3,
      };
    });
  }, [openItems]);

  // Idle animation loop — skips any creature being dragged or sorted
  React.useEffect(() => {
    function tick() {
      timeRef.current += 0.035;
      const t = timeRef.current;
      let changed = false;
      openItems.forEach(item => {
        const key = `${item.track}::${item.id}`;
        if (sorted[key] || dragRef.current?.key === key) return;
        const p = personalities.current[key];
        const pos = posRef.current[key];
        if (!p || !pos) return;
        posRef.current[key] = {
          ...pos,
          x: pos.baseX + Math.sin(t * p.speed + p.phase) * p.swayAmp,
          y: pos.baseY + Math.cos(t * p.speed * 0.8 + p.phase) * p.bobAmp,
        };
        changed = true;
      });
      if (changed) forceRender();
      animRef.current = requestAnimationFrame(tick);
    }
    animRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(animRef.current);
  }, [openItems, sorted]);

  function getCreatureColor(track) {
    return { records:'#ff6b35', publishing:'#d4e840', songstage:'#47c9ff', freelance:'#b47cff', content:'#ff4d8f' }[track] || '#aaa';
  }

  // Psyduck-inspired: round head, confused expression, little hands on cheeks, duck feet
  function CreatureSVG({ color, isDragging, hue }) {
    const lightColor = color + 'dd';
    const darkColor  = color + '99';
    const scale = isDragging ? 1.12 : 1;
    return (
      <svg width="56" height="64" viewBox="0 0 56 64"
        style={{display:'block', filter: isDragging ? `drop-shadow(0 6px 12px ${color}88)` : 'none',
          transform:`scale(${scale})`, transformOrigin:'50% 80%', transition:'transform 0.15s'}}>

        {/* Ground shadow */}
        <ellipse cx="28" cy="62" rx="13" ry="3.5" fill="rgba(0,0,0,0.25)"/>

        {/* Body — round, egg-shaped */}
        <ellipse cx="28" cy="42" rx="16" ry="18" fill={color}/>
        {/* Body highlight */}
        <ellipse cx="22" cy="34" rx="5" ry="7" fill="rgba(255,255,255,0.18)" transform="rotate(-20,22,34)"/>
        {/* Belly patch */}
        <ellipse cx="28" cy="46" rx="9" ry="11" fill={lightColor} opacity="0.55"/>

        {/* Stubby tail */}
        <ellipse cx="44" cy="40" rx="5" ry="4" fill={darkColor} transform="rotate(15,44,40)"/>
        <ellipse cx="47" cy="39" rx="3" ry="2.5" fill={color} transform="rotate(15,47,39)"/>

        {/* Left arm/hand on head (confused pose) */}
        <ellipse cx="13" cy="32" rx="4.5" ry="3.5" fill={color} transform="rotate(-30,13,32)"/>
        <ellipse cx="10" cy="29" rx="3.5" ry="3" fill={darkColor} transform="rotate(-30,10,29)"/>

        {/* Right arm/hand on head */}
        <ellipse cx="43" cy="32" rx="4.5" ry="3.5" fill={color} transform="rotate(30,43,32)"/>
        <ellipse cx="46" cy="29" rx="3.5" ry="3" fill={darkColor} transform="rotate(30,46,29)"/>

        {/* Feet — flat duck feet */}
        <ellipse cx="21" cy="59" rx="7" ry="3.5" fill={darkColor}/>
        <ellipse cx="35" cy="59" rx="7" ry="3.5" fill={darkColor}/>
        {/* Toe lines */}
        <line x1="16" y1="59" x2="13" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="21" y1="60" x2="21" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="26" y1="59" x2="28" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="30" y1="59" x2="27" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="35" y1="60" x2="35" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="40" y1="59" x2="42" y2="57" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>

        {/* Head — big round */}
        <circle cx="28" cy="22" r="18" fill={color}/>
        {/* Head highlight */}
        <ellipse cx="21" cy="13" rx="6" ry="8" fill="rgba(255,255,255,0.2)" transform="rotate(-15,21,13)"/>

        {/* Forehead bump / little horn nub */}
        <ellipse cx="28" cy="6" rx="4" ry="3" fill={darkColor}/>

        {/* Ears */}
        <ellipse cx="12" cy="12" rx="5" ry="7" fill={color} transform="rotate(-20,12,12)"/>
        <ellipse cx="12" cy="12" rx="2.5" ry="4" fill={darkColor} transform="rotate(-20,12,12)" opacity="0.6"/>
        <ellipse cx="44" cy="12" rx="5" ry="7" fill={color} transform="rotate(20,44,12)"/>
        <ellipse cx="44" cy="12" rx="2.5" ry="4" fill={darkColor} transform="rotate(20,44,12)" opacity="0.6"/>

        {/* Eyes — big, slightly crossed/confused */}
        <ellipse cx="22" cy="22" rx="5.5" ry="6" fill="white"/>
        <ellipse cx="34" cy="22" rx="5.5" ry="6" fill="white"/>
        {/* Pupils — slightly inward (confused look) */}
        <circle cx="23.5" cy="23" r="3" fill="#1a1a1a"/>
        <circle cx="32.5" cy="23" r="3" fill="#1a1a1a"/>
        {/* Eye shine */}
        <circle cx="24.5" cy="21.5" r="1.2" fill="white"/>
        <circle cx="33.5" cy="21.5" r="1.2" fill="white"/>
        {/* Worried brow lines */}
        <path d="M18 16 Q22 14 25 16" stroke={darkColor} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
        <path d="M31 16 Q34 14 38 16" stroke={darkColor} strokeWidth="1.5" fill="none" strokeLinecap="round"/>

        {/* Bill / beak */}
        <ellipse cx="28" cy="32" rx="6" ry="4" fill={darkColor}/>
        <ellipse cx="28" cy="31" rx="6" ry="3" fill={color} opacity="0.7"/>
        {/* Bill line */}
        <line x1="22" y1="32" x2="34" y2="32" stroke={darkColor} strokeWidth="1" opacity="0.5"/>

        {/* Sweat drop — confused/stressed */}
        {!isDragging && <>
          <ellipse cx="43" cy="14" rx="2.5" ry="4" fill="#87ceeb" opacity="0.7" transform="rotate(15,43,14)"/>
          <circle cx="43" cy="11" r="2" fill="#87ceeb" opacity="0.7"/>
        </>}
        {/* Stars when dragging — dazed */}
        {isDragging && <>
          <text x="6" y="10" fontSize="8" opacity="0.8">✦</text>
          <text x="44" y="8" fontSize="7" opacity="0.7">✦</text>
        </>}
      </svg>
    );
  }

  // ── Drag logic ────────────────────────────────────────────────────────────
  function getBucketZones() {
    const el = containerRef.current;
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return {
      tomorrow: { x: 0, y: rect.height - 140, w: 140, h: 140 },
      drop:     { x: rect.width - 140, y: rect.height - 140, w: 140, h: 140 },
      rect,
    };
  }

  function hitBucket(clientX, clientY) {
    const zones = getBucketZones();
    if (!zones) return null;
    const rx = clientX - zones.rect.left;
    const ry = clientY - zones.rect.top;
    if (rx < 140 && ry > zones.rect.height - 140) return 'tomorrow';
    if (rx > zones.rect.width - 140 && ry > zones.rect.height - 140) return 'drop';
    return null;
  }

  function startDrag(key, clientX, clientY, e) {
    if (sorted[key]) return;
    e.preventDefault();
    const pos = posRef.current[key];
    if (!pos) return;
    const el = containerRef.current;
    const rect = el.getBoundingClientRect();
    dragRef.current = {
      key,
      offsetX: clientX - rect.left - pos.x,
      offsetY: clientY - rect.top - pos.y,
    };
    setDragging(key);
  }

  function onMove(clientX, clientY) {
    if (!dragRef.current) return;
    const { key, offsetX, offsetY } = dragRef.current;
    const el = containerRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const newX = clientX - rect.left - offsetX;
    const newY = clientY - rect.top - offsetY;
    posRef.current[key] = { ...posRef.current[key], x: newX, y: newY };
    forceRender();
    setHoverBucket(hitBucket(clientX, clientY));
  }

  function endDrag(clientX, clientY) {
    if (!dragRef.current) return;
    const { key } = dragRef.current;
    const bucket = hitBucket(clientX, clientY);
    dragRef.current = null;
    setDragging(null);
    setHoverBucket(null);
    if (bucket) {
      doSort(key, bucket);
    } else {
      // Snap back to base
      const pos = posRef.current[key];
      if (pos) posRef.current[key] = { ...pos, x: pos.baseX, y: pos.baseY };
      forceRender();
    }
  }

  function doSort(key, destination) {
    const el = containerRef.current;
    const rect = el ? el.getBoundingClientRect() : { width: 520, height: 300 };
    const targetX = destination === 'tomorrow' ? 45 : rect.width - 100;
    const targetY = rect.height - 110;
    posRef.current[key] = { ...posRef.current[key], x: targetX, y: targetY };
    forceRender();
    setTimeout(() => {
      setSorted(s => ({ ...s, [key]: destination }));
      const poofId = Date.now() + Math.random();
      setPoofs(pf => [...pf, { id: poofId, x: targetX + 28, y: targetY + 20, dest: destination }]);
      setTimeout(() => setPoofs(pf => pf.filter(p => p.id !== poofId)), 700);
    }, 220);
  }

  // Mouse events
  function onMouseDown(key, e) { startDrag(key, e.clientX, e.clientY, e); }
  React.useEffect(() => {
    function onMouseMove(e) { onMove(e.clientX, e.clientY); }
    function onMouseUp(e) { endDrag(e.clientX, e.clientY); }
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => { window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
  }, [sorted]);

  // Touch events
  function onTouchStart(key, e) {
    const t = e.touches[0];
    startDrag(key, t.clientX, t.clientY, e);
  }
  React.useEffect(() => {
    function onTouchMove(e) { if (dragRef.current) { e.preventDefault(); const t=e.touches[0]; onMove(t.clientX, t.clientY); } }
    function onTouchEnd(e) { if (dragRef.current) { const t=e.changedTouches[0]; endDrag(t.clientX, t.clientY); } }
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd);
    return () => { window.removeEventListener('touchmove', onTouchMove); window.removeEventListener('touchend', onTouchEnd); };
  }, [sorted]);

  // Click to sort (for keyboard/tap without drag)
  const [clickSelected, setClickSelected] = React.useState(null);
  function handleCreatureClick(key) {
    if (dragging) return; // was a drag, not a click
    if (sorted[key]) return;
    setClickSelected(k => k === key ? null : key);
  }
  function handleBucketClick(dest) {
    if (clickSelected) { doSort(clickSelected, dest); setClickSelected(null); }
  }

  const unsortedCount = openItems.filter(i => !sorted[`${i.track}::${i.id}`]).length;
  const allSorted = unsortedCount === 0 && openItems.length > 0;

  React.useEffect(() => {
    if (allSorted) setTimeout(() => onAllSorted(sorted), 500);
  }, [allSorted]);

  const gameH = Math.max(300, 60 + Math.ceil(openItems.length / 4) * 90);

  return (
    <div>
      <div className="creature-game" ref={containerRef}
        style={{ height: gameH + 'px', cursor: dragging ? 'grabbing' : 'default', userSelect:'none' }}>
        <div className="creature-game-bg"/>

        {/* Stars */}
        {[...Array(14)].map((_,i) => (
          <div key={i} style={{
            position:'absolute', borderRadius:'50%',
            width: i%4===0?2:1, height: i%4===0?2:1,
            background:'rgba(255,255,255,' + (0.3+i*0.03) + ')',
            left: (6+i*6.5)+'%', top: (4+i*3.2)+'%',
            animation:`pulse ${1.4+i*0.25}s infinite alternate`
          }}/>
        ))}

        <div className="game-instructions">
          {allSorted
            ? '✓ All sorted — moving on...'
            : dragging
            ? 'Drop into a bucket →'
            : clickSelected
            ? 'Now tap a bucket to send it'
            : 'Drag a creature into a bucket — or tap to select'}
        </div>
        <div className="game-counter">{unsortedCount} left</div>

        {/* Tomorrow bucket */}
        <div className="bucket bucket-tomorrow"
          style={{
            filter: hoverBucket==='tomorrow' ? 'brightness(1.6)' : clickSelected ? 'brightness(1.25)' : 'brightness(0.85)',
            transition:'filter 0.15s', cursor: clickSelected ? 'pointer' : 'default'
          }}
          onClick={() => handleBucketClick('tomorrow')}>
          <div className="bucket-label">Tomorrow</div>
          <div className="bucket-body">
            <svg width="110" height="72" viewBox="0 0 110 72">
              <path d="M18 24 L10 68 L100 68 L92 24 Z" fill="#0d1a24" stroke="#47c9ff" strokeWidth="1.5"/>
              <path d="M18 24 L92 24" stroke="#47c9ff" strokeWidth="2"/>
              <path d="M33 24 Q55 6 77 24" fill="none" stroke="#47c9ff" strokeWidth="2"/>
              {/* Moon */}
              <path d="M48 44 Q42 38 46 30 Q38 34 38 44 Q38 54 48 58 Q40 52 48 44Z" fill="#47c9ff" opacity="0.7"/>
              {/* Stars inside */}
              <circle cx="68" cy="36" r="1.5" fill="#47c9ff" opacity="0.6"/>
              <circle cx="72" cy="48" r="1" fill="#47c9ff" opacity="0.5"/>
              <circle cx="60" cy="54" r="1" fill="#47c9ff" opacity="0.4"/>
              {Object.values(sorted).filter(v=>v==='tomorrow').length > 0 && (
                <text x="55" y="20" textAnchor="middle" fontSize="11" fill="#47c9ff" fontFamily="DM Mono,monospace">
                  {Object.values(sorted).filter(v=>v==='tomorrow').length} in
                </text>
              )}
            </svg>
          </div>
        </div>

        {/* Drop bucket */}
        <div className="bucket bucket-drop"
          style={{
            filter: hoverBucket==='drop' ? 'brightness(1.6)' : clickSelected ? 'brightness(1.25)' : 'brightness(0.85)',
            transition:'filter 0.15s', cursor: clickSelected ? 'pointer' : 'default'
          }}
          onClick={() => handleBucketClick('drop')}>
          <div className="bucket-label">Drop it</div>
          <div className="bucket-body">
            <svg width="110" height="72" viewBox="0 0 110 72">
              <ellipse cx="55" cy="56" rx="42" ry="14" fill="#1a0818" stroke="#ff4d8f" strokeWidth="1.5"/>
              <ellipse cx="55" cy="56" rx="30" ry="9" fill="#0f0012" stroke="#ff4d8f" strokeWidth="0.5" opacity="0.6"/>
              <ellipse cx="55" cy="56" rx="16" ry="5" fill="#000" opacity="0.9"/>
              <path d="M30 56 Q42 48 55 56 Q68 64 80 56" fill="none" stroke="#ff4d8f" strokeWidth="0.8" opacity="0.35"/>
              <path d="M38 50 Q55 42 72 50" fill="none" stroke="#ff4d8f" strokeWidth="0.6" opacity="0.2"/>
              {/* Lightning bolt */}
              <path d="M62 28 L52 42 L58 42 L48 62 L66 44 L59 44 Z" fill="#ff4d8f" opacity="0.65"/>
              {Object.values(sorted).filter(v=>v==='drop').length > 0 && (
                <text x="55" y="20" textAnchor="middle" fontSize="11" fill="#ff4d8f" fontFamily="DM Mono,monospace">
                  {Object.values(sorted).filter(v=>v==='drop').length} gone
                </text>
              )}
            </svg>
          </div>
        </div>

        {/* Floor */}
        <div className="creature-floor"/>

        {/* Creatures */}
        {openItems.map(item => {
          const key = `${item.track}::${item.id}`;
          const pos = posRef.current[key];
          const isSorted = !!sorted[key];
          const isDrag = dragging === key;
          const isClickSel = clickSelected === key;
          const color = getCreatureColor(item.track);
          if (!pos) return null;
          return (
            <div key={key} style={{
              position:'absolute',
              left: pos.x + 'px',
              top:  pos.y + 'px',
              opacity: isSorted ? 0 : 1,
              transition: isSorted ? 'opacity 0.3s' : isDrag ? 'none' : 'opacity 0.3s',
              zIndex: isDrag ? 20 : isClickSel ? 10 : 2,
              cursor: isSorted ? 'default' : isDrag ? 'grabbing' : 'grab',
              filter: isClickSel && !isDrag ? `drop-shadow(0 0 8px ${color})` : 'none',
            }}
              onMouseDown={e => !isSorted && onMouseDown(key, e)}
              onTouchStart={e => !isSorted && onTouchStart(key, e)}
              onClick={() => handleCreatureClick(key)}
            >
              <div className="creature-name-tag" style={{
                borderColor: color, color,
                background:'rgba(0,0,0,0.88)',
                transform: isDrag ? 'translateX(-50%) scale(1.05)' : 'translateX(-50%)',
                left:'50%', position:'absolute',
              }}>
                {item.name.length > 16 ? item.name.slice(0,14)+'…' : item.name}
              </div>
              <CreatureSVG color={color} isDragging={isDrag || isClickSel}/>
            </div>
          );
        })}

        {/* Empty state */}
        {openItems.length === 0 && (
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'10px'}}>
            <div style={{fontSize:'28px'}}>✨</div>
            <div style={{fontSize:'12px',color:'var(--success)',letterSpacing:'1px'}}>Clean slate — nothing open</div>
          </div>
        )}

        {/* Poof effects */}
        {poofs.map(p => (
          <div key={p.id} className="poof" style={{left:p.x+'px',top:p.y+'px',position:'absolute'}}>
            {p.dest==='tomorrow' ? '💫' : '💥'}
          </div>
        ))}
      </div>

      {/* Below-game instruction */}
      <div style={{textAlign:'center',fontSize:'10px',color:'var(--text3)',marginTop:'10px',letterSpacing:'1px'}}>
        {clickSelected
          ? 'TAP A BUCKET ABOVE TO SORT · OR DRAG DIRECTLY'
          : unsortedCount > 0
          ? 'DRAG INTO A BUCKET · OR TAP TO SELECT FIRST'
          : ''}
      </div>
    </div>
  );
}

// ── SHUTDOWN MODAL ────────────────────────────────────────────────────────────
function ShutdownModal({ items, onClose, onComplete }) {
  const [step, setStep] = useState(0);
  const [gameSorted, setGameSorted] = useState(null); // result from creature game
  const [win, setWin] = useState('');
  const [top3, setTop3] = useState(['','','']);
  const [brainDump, setBrainDump] = useState('');

  // Gather open items across all tracks
  const openItems = Object.entries(items).flatMap(([track, trackItems]) =>
    trackItems.filter(i => !(DONE_STATUSES[track]||[]).includes(i.status))
              .map(i => ({...i, track}))
  );

  function handleGameDone(sorted) {
    setGameSorted(sorted);
    setTimeout(() => setStep(1), 500);
  }

  function handleComplete() {
    const log = { win, top3, brainDump, gameSorted, completedAt: new Date().toISOString() };
    saveShutdownLog(log);
    onComplete(log);
  }

  const stepLabels = ['Sort your tasks','Before you go','Brain dump'];

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:'580px'}}>
        <div className="modal-header">
          <div>
            <div className="modal-title">Closing Out</div>
            <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}}>
              {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <div className="modal-body">
          {/* Step indicator */}
          <div className="shutdown-step-indicator">
            {stepLabels.map((label,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                <div className={`shutdown-step-dot${i===step?' active':i<step?' done':''}`}/>
                <span style={{fontSize:'10px',color:i===step?'var(--text2)':'var(--text3)',letterSpacing:'1px'}}>
                  {label}
                </span>
                {i < 2 && <span style={{color:'var(--text3)',fontSize:'10px',marginLeft:'4px'}}>·</span>}
              </div>
            ))}
          </div>

          {/* Step 0: Creature game */}
          {step === 0 && (
            <>
              <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'14px'}}>
                {openItems.length === 0
                  ? 'Nothing open — clean slate.'
                  : `${openItems.length} creature${openItems.length>1?'s':''} need a home. Sort them all to continue.`}
              </div>
              <CreatureGame openItems={openItems} onAllSorted={handleGameDone}/>
              {openItems.length === 0 && (
                <div style={{textAlign:'center',padding:'16px 0'}}>
                  <button className="btn-primary" onClick={()=>setStep(1)}>Next →</button>
                </div>
              )}
            </>
          )}

          {/* Step 1: Win + Top 3 */}
          {step === 1 && (
            <>
              <div className="form-group">
                <label className="form-label">One win from today</label>
                <textarea
                  className="win-input"
                  placeholder="What moved today? Even small counts."
                  value={win}
                  onChange={e=>setWin(e.target.value)}
                  autoFocus
                />
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Top 3 for tomorrow</label>
                {[0,1,2].map(i => (
                  <div key={i} className="tomorrow-row">
                    <span className="tomorrow-num">{i+1}.</span>
                    <input
                      className="tomorrow-input"
                      style={{marginBottom:0}}
                      placeholder={i===0?'Most important thing':''}
                      value={top3[i]}
                      onChange={e=>{const n=[...top3];n[i]=e.target.value;setTop3(n);}}
                    />
                  </div>
                ))}
              </div>
            </>
          )}

          {/* Step 2: Brain dump */}
          {step === 2 && (
            <>
              <div style={{fontSize:'13px',color:'var(--text2)',marginBottom:'16px',lineHeight:'1.6'}}>
                Anything still running in the background? Get it out.
                It'll be here tomorrow. You don't have to carry it.
              </div>
              <textarea
                className="win-input"
                style={{minHeight:'120px'}}
                placeholder="Just type it out..."
                value={brainDump}
                onChange={e=>setBrainDump(e.target.value)}
                autoFocus
              />
            </>
          )}
        </div>

        <div className="modal-footer">
          {step > 0 && <button className="btn-secondary" onClick={()=>setStep(s=>s-1)}>← Back</button>}
          {step === 1 && <button className="btn-primary" onClick={()=>setStep(2)}>Next →</button>}
          {step === 2 && (
            <>
              <button className="btn-secondary" onClick={handleComplete}>Skip</button>
              <button className="btn-primary" onClick={handleComplete}>Close the workday →</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── TRANSITION SCREEN ─────────────────────────────────────────────────────────

  return (
    <div className="transition-screen">
      <div className="transition-pulse"/>
