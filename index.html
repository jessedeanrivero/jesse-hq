<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jesse HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0e; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
  --accent:#e8ff47; --text:#f0f0f0; --text2:#888; --text3:#555;
  --records:#ff6b35; --publishing:#e8ff47; --songstage:#47c9ff;
  --freelance:#b47cff; --content:#ff4d8f; --success:#4dff91; --warning:#ffb347;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:2px;text-transform:uppercase;}
.nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);padding:12px 24px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;cursor:pointer;transition:all 0.15s;font-size:12px;color:var(--text2);border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--text);background:var(--surface2);}
.nav-item[data-track="dashboard"].active{border-left-color:var(--accent);}
.nav-item[data-track="calendar"].active{border-left-color:var(--songstage);}
.nav-item[data-track="records"].active{border-left-color:var(--records);}
.nav-item[data-track="publishing"].active{border-left-color:var(--publishing);}
.nav-item[data-track="songstage"].active{border-left-color:var(--songstage);}
.nav-item[data-track="freelance"].active{border-left-color:var(--freelance);}
.nav-item[data-track="content"].active{border-left-color:var(--content);}
.nav-item[data-track="checkin"].active{border-left-color:var(--success);}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-dot.records{background:var(--records);} .nav-dot.publishing{background:var(--publishing);}
.nav-dot.songstage{background:var(--songstage);} .nav-dot.freelance{background:var(--freelance);}
.nav-dot.content{background:var(--content);} .nav-dot.dashboard{background:var(--accent);}
.nav-dot.checkin{background:var(--success);} .nav-dot.calendar{background:var(--songstage);}
.sidebar-bottom{padding:16px 24px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);}
.auth-status{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.auth-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.auth-dot.connected{background:var(--success);}
.signin-btn{background:var(--accent);color:#000;border:none;padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;width:100%;margin-top:8px;}
.main{margin-left:220px;flex:1;min-height:100vh;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg);position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.week-badge{background:var(--surface2);border:1px solid var(--border);padding:4px 10px;font-size:10px;letter-spacing:1px;}
.page{padding:32px;}
/* BUTTONS */
.add-btn{background:var(--accent);color:#000;border:none;padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.add-btn:hover{opacity:0.85;}
.btn-primary{background:var(--accent);color:#000;border:none;padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{background:transparent;color:var(--text2);border:1px solid var(--border);padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;}
.btn-secondary:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;letter-spacing:1px;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
/* DASHBOARD */
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.records::before{background:var(--records);} .stat-card.publishing::before{background:var(--publishing);}
.stat-card.songstage::before{background:var(--songstage);} .stat-card.freelance::before{background:var(--freelance);}
.stat-card.content::before{background:var(--content);} .stat-card.hours::before{background:var(--accent);}
.stat-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.stat-number{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;margin-bottom:4px;}
.stat-sub{font-size:10px;color:var(--text2);}
.stale-section{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warning);padding:20px;margin-bottom:24px;}
.stale-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--warning);margin-bottom:14px;}
.stale-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.stale-item:last-child{border-bottom:none;}
.stale-item-left{display:flex;align-items:center;gap:10px;}
.stale-days{font-size:10px;color:var(--warning);background:rgba(255,179,71,0.1);padding:2px 6px;}
/* TRACK */
.track-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.track-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;}
.kanban-col{min-width:240px;flex-shrink:0;}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kanban-col-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.kanban-count{background:var(--surface2);border:1px solid var(--border);font-size:10px;padding:2px 6px;color:var(--text3);}
.kanban-cards{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);padding:14px;position:relative;transition:border-color 0.15s,transform 0.15s;}
.card:hover{border-color:var(--text3);transform:translateY(-1px);}
.card-track-line{position:absolute;left:0;top:0;bottom:0;width:2px;}
.card-name{font-size:13px;font-weight:500;margin-bottom:6px;padding-left:10px;}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;padding-left:10px;}
.tag{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-left:10px;flex-wrap:wrap;}
.card-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.15s;letter-spacing:1px;text-transform:uppercase;}
.card-btn:hover{color:var(--text);border-color:var(--text3);}
.card-btn.done:hover{color:var(--success);border-color:var(--success);}
.card-btn.delete:hover{color:#ff4444;border-color:#ff4444;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:80px;}
/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-month-label{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;min-width:200px;text-align:center;}
.cal-view-toggle{display:flex;gap:0;}
.cal-view-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;margin-left:-1px;}
.cal-view-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* MONTH VIEW */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-day-header{background:var(--surface);padding:8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);text-align:center;}
.cal-day{background:var(--surface);min-height:90px;padding:8px;position:relative;cursor:pointer;transition:background 0.1s;}
.cal-day:hover{background:var(--surface2);}
.cal-day.other-month{opacity:0.35;}
.cal-day.today{background:var(--surface2);}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:700;}
.cal-day-num{font-size:12px;margin-bottom:4px;}
.cal-day-add{position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:14px;line-height:16px;text-align:center;cursor:pointer;display:none;transition:all 0.15s;}
.cal-day:hover .cal-day-add{display:block;}
.cal-day-add:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.cal-event-pill{font-size:9px;padding:2px 5px;margin-bottom:2px;border-radius:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
/* WEEK VIEW */
.cal-week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--border);}
.cal-week-header{background:var(--surface);padding:10px 6px;font-size:10px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.cal-week-header.today-col{background:var(--surface2);}
.cal-week-header-day{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.cal-week-header-date{font-size:10px;color:var(--text3);}
.cal-hour-label{background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 8px;font-size:9px;color:var(--text3);text-align:right;}
.cal-week-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:40px;position:relative;cursor:pointer;transition:background 0.1s;}
.cal-week-cell:hover{background:var(--surface2);}
.cal-week-cell.today-col{background:rgba(232,255,71,0.02);}
.cal-week-event{position:absolute;left:2px;right:2px;font-size:9px;padding:2px 4px;overflow:hidden;z-index:1;cursor:pointer;}
/* DAY VIEW */
.cal-day-view{display:grid;grid-template-columns:60px 1fr;border:1px solid var(--border);}
.cal-day-view-header{grid-column:1/-1;background:var(--surface);padding:14px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.cal-day-hour-label{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 8px;font-size:9px;color:var(--text3);text-align:right;background:var(--surface);}
.cal-day-hour-cell{border-bottom:1px solid var(--border);min-height:48px;position:relative;cursor:pointer;padding:2px;}
.cal-day-hour-cell:hover{background:var(--surface2);}
.cal-day-event{font-size:11px;padding:4px 8px;margin:1px;cursor:pointer;}
/* BLOCK PREVIEW */
.block-preview{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:16px;margin-bottom:16px;}
.block-preview-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.block-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.block-row:last-child{border-bottom:none;}
.block-row-left{display:flex;align-items:center;gap:10px;}
.block-check{width:16px;height:16px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;}
.block-check.checked{background:var(--accent);border-color:var(--accent);color:#000;}
/* AI TASKS */
.ai-thinking{display:flex;align-items:center;gap:10px;padding:16px;background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ai-tasks{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.ai-task{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 14px;}
.ai-task-name{font-size:13px;margin-bottom:4px;}
.ai-task-meta{font-size:10px;color:var(--text3);}
/* CHECK-IN */
.checkin-wrap{max-width:680px;}
.checkin-intro{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--success);padding:20px;margin-bottom:24px;}
.checkin-intro-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.checkin-intro-sub{font-size:12px;color:var(--text2);}
.checkin-section{background:var(--surface);border:1px solid var(--border);padding:20px;margin-bottom:16px;position:relative;}
.checkin-section::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.checkin-section.records::before{background:var(--records);}
.checkin-section.publishing::before{background:var(--publishing);}
.checkin-section.songstage::before{background:var(--songstage);}
.checkin-section.freelance::before{background:var(--freelance);}
.checkin-section.content::before{background:var(--content);}
.checkin-section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;}
.checkin-section-sub{font-size:11px;color:var(--text2);margin-bottom:14px;}
.stale-prompt{background:rgba(255,179,71,0.08);border:1px solid rgba(255,179,71,0.2);padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--warning);}
.goal-card{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.goal-track-name{font-size:11px;margin-bottom:6px;}
.goal-text{font-size:12px;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 18px;font-size:12px;z-index:2000;animation:slideIn 0.2s ease;max-width:320px;}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* AUTH */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;}
.auth-card{background:var(--surface);border:1px solid var(--border);padding:48px;max-width:420px;width:100%;text-align:center;}
.auth-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent);margin-bottom:8px;}
.auth-tagline{font-size:12px;color:var(--text2);margin-bottom:32px;}
.auth-features{text-align:left;margin-bottom:32px;}
.auth-feature{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
.auth-feature:last-child{border-bottom:none;}
.auth-feature-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.google-btn{background:#fff;color:#333;border:none;padding:12px 24px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;}
.demo-btn{background:transparent;color:var(--text3);border:1px solid var(--border);padding:10px 24px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;width:100%;margin-top:10px;}
.demo-btn:hover{color:var(--text2);border-color:var(--text3);}

/* ── MOBILE ─────────────────────────────────────────────────────────────────── */
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
  backdrop-filter: blur(2px);
}

@media (max-width: 768px) {
  .hamburger { display: block; }

  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 200;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.open {
    display: block;
  }

  .main {
    margin-left: 0 !important;
  }

  .topbar {
    padding: 0 16px;
  }

  .page {
    padding: 16px;
  }

  .dashboard-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .kanban {
    flex-direction: column;
  }

  .kanban-col {
    min-width: unset;
    width: 100%;
  }

  .cal-month-grid {
    font-size: 10px;
  }

  .cal-day {
    min-height: 60px;
    padding: 4px;
  }

  .cal-event-pill {
    font-size: 8px;
    padding: 1px 3px;
  }

  .modal {
    width: 95vw;
    max-height: 95vh;
  }

  .checkin-wrap {
    max-width: 100%;
  }

  .track-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  .topbar-right .week-badge {
    display: none;
  }

  .cal-toolbar {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }

  .cal-month-label {
    font-size: 16px;
    min-width: unset;
  }
}

@media (max-width: 480px) {
  .dashboard-grid {
    grid-template-columns: 1fr;
  }

  .stat-number {
    font-size: 28px;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CLIENT_ID    = '84777476766-nmbmb2oj9c497qqucmlcoemgvl7j74mb.apps.googleusercontent.com';
const SHEET_ID     = '1awdiuld1ZjawYHo_vys0kHPp0KzY4oeT1J_TsQcB5KE';
const SCOPES       = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/calendar';
// AI calls route through /api/breakdown — key stored securely in Vercel env vars

const TRACKS = {
  records:    { label:'Real Fun Records',    color:'var(--records)',   tab:'Records',    icon:'🎵' },

let gapiLoaded = false, gisLoaded = false, tokenClient = null;

function loadGapi() {
  return new Promise(res => {
    if (gapiLoaded) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs:[
        'https://sheets.googleapis.com/$discovery/rest?version=v4',
        'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
      ]});
      gapiLoaded = true; res();
    });
    document.head.appendChild(s);
  });
}

function loadGis() {
  return new Promise(res => {
    if (gisLoaded) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => { gisLoaded = true; res(); };
    document.head.appendChild(s);
  });
}

async function initGoogle(onToken) {
  await Promise.all([loadGapi(), loadGis()]);
  tokenClient = google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback:onToken });
}

function requestToken() { tokenClient && tokenClient.requestAccessToken({ prompt:'' }); }

  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId:SHEET_ID, range:`${tab}!${col}${rowIndex+2}`,

async function deleteRowFromSheet(tab, rowIndex) {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId:SHEET_ID });
  const sheet = meta.result.sheets.find(s => s.properties.title === tab);
  if (!sheet) return;
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId:SHEET_ID,
    resource:{ requests:[{ deleteDimension:{ range:{ sheetId:sheet.properties.sheetId, dimension:'ROWS', startIndex:rowIndex+1, endIndex:rowIndex+2 }}}]},
  });
}

}

async function getCalendarEvents(weeksAhead=2) {
  try {
    const now = new Date(), end = new Date(now);
    end.setDate(end.getDate() + weeksAhead * 7);

    // Fetch all calendars first
    const calendars = await getAllCalendars();
    const calIds = calendars.map(c => c.id);
    if (calIds.length === 0) calIds.push('primary');

    // Fetch events from all calendars in parallel
    const results = await Promise.all(calIds.map(async calId => {
      try {
        const r = await gapi.client.calendar.events.list({
          calendarId: calId,
          timeMin: now.toISOString(),
          timeMax: end.toISOString(),
          singleEvents: true,
          orderBy: 'startTime',
          maxResults: 50,
        });
        const cal = calendars.find(c => c.id === calId);
        return (r.result.items || []).map(e => ({
          ...e,
          _calendarName: cal?.summary || calId,
          _calendarColor: cal?.backgroundColor || '#888',
          _calendarId: calId,
        }));
      } catch(e) { return []; }
    }));

    // Merge, deduplicate by title+start, and sort by start time
    const all = results.flat();
    const seen = new Set();
    const deduped = all.filter(e => {
      const key = `${e.summary||''}|${e.start?.dateTime||e.start?.date||''}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    deduped.sort((a, b) => {
      const aTime = a.start?.dateTime || a.start?.date || '';
      const bTime = b.start?.dateTime || b.start?.date || '';
      return aTime.localeCompare(bTime);
    });
    return deduped;
  } catch(e) { return []; }
}

function getWeekLabel() {
  const d = new Date(), day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  const mon = new Date(d); mon.setDate(diff);
  return `Week of ${mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}

function daysSince(dateStr) {
  if (!dateStr) return 0;
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

function fmtTime(date) {
  return date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function fmtDate(date) {
  return date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function getDaysInMonth(year, month) {
  return new Date(year, month+1, 0).getDate();
}

function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}

// Find open time slots for a task on the right days, checking real calendar
function getSmartSlots(track, calEvents, durationHours=1.5) {
  const slots = [];
  const now = new Date();
  const today = new Date(now);
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const HARD_CUTOFF = 16; // 4pm

  // Validate track has defined schedule days
  const trackHasDays = Object.values(DAY_SCHEDULE).some(daySlots =>
    daySlots.some(s => s.track === track)
  );
  if (!trackHasDays) return [];

  for (let i=0; i<14; i++) { // look 2 weeks ahead
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dayName = dayNames[d.getDay()];
    const schedule = DAY_SCHEDULE[dayName] || [];
    const trackSlots = schedule.filter(s => s.track === track);

    for (const slot of trackSlots) {
      const dayStart = Math.max(slot.start, 8); // never before 8am
      const dayEnd   = Math.min(slot.end, HARD_CUTOFF); // never after 4pm
      if (dayStart >= dayEnd) continue;

      // Only suggest future times — if today, start from current time
      const isToday = isSameDay(d, now);
      const minStart = isToday
        ? Math.max(dayStart, now.getHours() + now.getMinutes()/60 + 0.25) // 15min buffer
        : dayStart;
      if (minStart + durationHours > dayEnd) continue; // not enough time left today

      // Get all calendar events for this day
      const dayEvents = calEvents.filter(e => {
        const es = e.start?.dateTime ? new Date(e.start.dateTime) : null;
        return es && isSameDay(es, d);
      }).map(e => ({
        start: new Date(e.start.dateTime).getHours() + new Date(e.start.dateTime).getMinutes()/60,
        end:   e.end?.dateTime ? new Date(e.end.dateTime).getHours() + new Date(e.end.dateTime).getMinutes()/60 : new Date(e.start.dateTime).getHours() + 1,
        title: e.summary,
      })).sort((a,b) => a.start - b.start);

      // Find open windows of at least durationHours within the slot
      const windows = [];
      let cursor = minStart; // start from now if today, else start of day slot

      for (const ev of dayEvents) {
        if (ev.start > cursor && ev.start - cursor >= durationHours) {
          windows.push({ start: cursor, end: Math.min(ev.start, dayEnd) });
        }
        cursor = Math.max(cursor, ev.end);
      }
      // Check remaining time after last event
      if (dayEnd - cursor >= durationHours) {
        windows.push({ start: cursor, end: dayEnd });
      }

      // Create 1-2 slots per window (morning and afternoon if room)
      for (const win of windows) {
        // Snap to nearest half hour
        const startH = Math.ceil(win.start * 2) / 2;
        const endH   = Math.min(startH + durationHours, win.end, HARD_CUTOFF);
        if (endH - startH < durationHours * 0.75) continue; // skip if too short

        const startDt = new Date(d);
        startDt.setHours(Math.floor(startH), (startH % 1) * 60, 0, 0);
        const endDt = new Date(d);
        endDt.setHours(Math.floor(endH), (endH % 1) * 60, 0, 0);

        const fmtH = h => {
          const hr = Math.floor(h), min = (h % 1) * 60;
          const ampm = hr >= 12 ? 'pm' : 'am';
          const displayHr = hr > 12 ? hr - 12 : hr === 0 ? 12 : hr;
          return min > 0 ? `${displayHr}:${String(min).padStart(2,'0')}${ampm}` : `${displayHr}${ampm}`;
        };

        slots.push({
          date: new Date(d),
          dayName,
          label: `${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${fmtH(startH)}–${fmtH(endH)}`,
          startHour: startH,
          endHour: endH,
          conflict: false,
          startISO: startDt.toISOString(),
          endISO: endDt.toISOString(),
          durationHours: endH - startH,
        });

        // If window is big enough, offer an afternoon slot too
        const afternoonStart = Math.max(startH + durationHours + 0.5, 13);
        if (win.end - afternoonStart >= durationHours && afternoonStart + durationHours <= HARD_CUTOFF) {
          const aStartDt = new Date(d); aStartDt.setHours(Math.floor(afternoonStart),(afternoonStart%1)*60,0,0);
          const aEndH = Math.min(afternoonStart + durationHours, HARD_CUTOFF);
          const aEndDt = new Date(d); aEndDt.setHours(Math.floor(aEndH),(aEndH%1)*60,0,0);
          slots.push({
            date: new Date(d), dayName,
            label: `${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${fmtH(afternoonStart)}–${fmtH(aEndH)}`,
            startHour: afternoonStart, endHour: aEndH, conflict: false,
            startISO: aStartDt.toISOString(), endISO: aEndDt.toISOString(),
            durationHours: aEndH - afternoonStart,
          });
        }

        if (slots.length >= 6) break; // max 6 suggestions
      }
      if (slots.length >= 6) break;
    }
    if (slots.length >= 6) break;
  }
  return slots;
}

              </div>

                      <div>
                        <div style={{fontSize:'12px'}}>{s.label}</div>
                        {s.conflict&&<div style={{fontSize:'10px',color:'var(--warning)'}}>⚠ Overlaps with: {s.conflictName}</div>}
                      </div>

            <button className="btn-secondary" onClick={()=>save(false)}>Skip</button>
            <button className="btn-primary" onClick={()=>save(selected!==null)}>
              {selected!==null?'Block Time + Save':'Save Without Blocking'}
            </button>
          </div>
        </>)}
      </div>
    </div>
  );
}

function AddEventModal({ date, onClose, onAdd }) {
  const [form, setForm]= useState({title:'',startTime:'09:00',endTime:'10:00',track:''});
  function save() {
    if (!form.title.trim()) return;
    const start = new Date(date); const [sh,sm]=form.startTime.split(':'); start.setHours(+sh,+sm,0,0);
    const end   = new Date(date); const [eh,em]=form.endTime.split(':');   end.setHours(+eh,+em,0,0);
    // Enforce 4pm cutoff
    if (start.getHours()>=16) { alert('Nothing after 4pm!'); return; }
    if (end.getHours()>=16) end.setHours(16,0,0,0);
    onAdd({ title:form.title, startISO:start.toISOString(), endISO:end.toISOString(), track:form.track, color: form.track?TRACK_COLORS_HEX[form.track]:'#888' });
    onClose();
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Add Event — {fmtDate(date)}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Title *</label>
            <input className="form-input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} autoFocus/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <div className="form-group"><label className="form-label">Start Time</label>
              <input className="form-input" type="time" value={form.startTime} onChange={e=>setForm({...form,startTime:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">End Time (max 4pm)</label>

          </div>

          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save}>Add to Calendar</button>

  );
}

// ── CALENDAR PAGE ─────────────────────────────────────────────────────────────
function CalendarPage({ calEvents, onAddEvent, onEditEvent, onDeleteEvent, demoMode }) {
  const today = new Date();
  const [view, setView]      = useState('week');
  const [current, setCurrent]= useState(new Date());
  const [addEventDate, setAddEventDate] = useState(null);
  const [editEvent, setEditEvent]       = useState(null);

  const HOURS = Array.from({length:24},(_,i)=>i);

  function eventsForDay(d) {
    return calEvents.filter(e=>{
      const start = e.start?.dateTime ? new Date(e.start.dateTime) : e.start?.date ? new Date(e.start.date+'T00:00:00') : null;
      return start && isSameDay(start,d);
    });
  }

  function eventColor(e) {
    if (e._track) return TRACK_COLORS_HEX[e._track]||'#888';
    const title=e.summary||'';
    for(const [k,t] of Object.entries(TRACKS)){
      if(title.toLowerCase().includes(t.label.toLowerCase().split(' ')[0].toLowerCase())) return TRACK_COLORS_HEX[k];
    }
    return e._calendarColor||'#555';
  }

  function fmtHour(h) {
    if(h===0) return '12am'; if(h===12) return '12pm';
    return h>12?`${h-12}pm`:`${h}am`;
  }

  // Overlap layout — returns col index per event and total cols
  function layoutEvents(events) {
    const sorted=[...events].sort((a,b)=>{
      const at=a.start?.dateTime?new Date(a.start.dateTime).getTime():0;
      const bt=b.start?.dateTime?new Date(b.start.dateTime).getTime():0;
      return at-bt;
    });
    const cols=[], result=new Map();
    for(const ev of sorted){
      const es=ev.start?.dateTime?new Date(ev.start.dateTime).getTime():0;
      const ee=ev.end?.dateTime?new Date(ev.end.dateTime).getTime():es+3600000;
      let placed=false;
      for(let ci=0;ci<cols.length;ci++){
        const last=cols[ci][cols[ci].length-1];
        const ls=last.start?.dateTime?new Date(last.start.dateTime).getTime():0;
        const le=last.end?.dateTime?new Date(last.end.dateTime).getTime():ls+3600000;
        if(es>=le){cols[ci].push(ev);result.set(ev,ci);placed=true;break;}
      }
      if(!placed){cols.push([ev]);result.set(ev,cols.length-1);}
    }
    return {layout:result,totalCols:Math.max(cols.length,1)};
  }

  // MONTH VIEW
  function MonthView() {
    const year=current.getFullYear(),month=current.getMonth();
    const firstDay=getFirstDayOfMonth(year,month),daysInMonth=getDaysInMonth(year,month);
    const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const cells=[];
    for(let i=0;i<firstDay;i++){const d=new Date(year,month,-(firstDay-i-1));cells.push({date:d,otherMonth:true});}
    for(let i=1;i<=daysInMonth;i++) cells.push({date:new Date(year,month,i),otherMonth:false});
    while(cells.length%7!==0){const last=cells[cells.length-1].date;cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),otherMonth:true});}
    return (
      <div className="cal-month-grid">
        {dayNames.map(d=><div key={d} className="cal-day-header">{d}</div>)}
        {cells.map((cell,i)=>{
          const evs=eventsForDay(cell.date),isToday=isSameDay(cell.date,today);
          return (
            <div key={i} className={`cal-day${cell.otherMonth?' other-month':''}${isToday?' today':''}`}>
              <div className="cal-day-num">{cell.date.getDate()}</div>
              <div className="cal-day-add" onClick={e=>{e.stopPropagation();setAddEventDate(new Date(cell.date));}}>+</div>
              {evs.slice(0,3).map((e,j)=>(
                <div key={j} className="cal-event-pill" onClick={ev=>{ev.stopPropagation();setEditEvent(e);}}
                  style={{background:eventColor(e)+'22',color:eventColor(e),border:`1px solid ${eventColor(e)}44`,cursor:'pointer'}}
                  title={`${e.summary}${e._calendarName?' ('+e._calendarName+')':''}`}>
                  {e.start?.dateTime?fmtTime(new Date(e.start.dateTime))+' ':''}{e.summary}
                </div>
              ))}
              {evs.length>3&&<div style={{fontSize:'9px',color:'var(--text3)',cursor:'pointer'}}
                onClick={()=>{setCurrent(new Date(cell.date));setView('day');}}>+{evs.length-3} more</div>}
            </div>
          );
        })}
      </div>
    );
  }

  // WEEK VIEW — absolute positioned events with overlap stagger
  function WeekView() {
    const startOfWeek=new Date(current),day=startOfWeek.getDay();
    startOfWeek.setDate(startOfWeek.getDate()-day+(day===0?-6:1));
    const days=Array.from({length:7},(_,i)=>{const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);return d;});
    const CELL_H=48;
    return (
      <div style={{overflowX:'auto',overflowY:'auto',maxHeight:'80vh'}}>
        <div style={{position:'relative',minWidth:'700px'}}>
          {/* Sticky header */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',position:'sticky',top:0,zIndex:20,background:'var(--bg)'}}>
            <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',height:'48px'}}></div>
            {days.map((d,i)=>(
              <div key={i} className={`cal-week-header${isSameDay(d,today)?' today-col':''}`} style={{borderRight:'1px solid var(--border)'}}>
                <div className="cal-week-header-day">{d.toLocaleDateString('en-US',{weekday:'short'})}</div>
                <div className="cal-week-header-date" style={{color:isSameDay(d,today)?'var(--accent)':'var(--text3)'}}>{d.getDate()}</div>
              </div>
            ))}
          </div>
          {/* Hour grid */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',minWidth:'700px'}}>
            {HOURS.map(hour=>(
              <React.Fragment key={hour}>
                <div className="cal-hour-label" style={{height:`${CELL_H}px`,display:'flex',alignItems:'flex-start',paddingTop:'4px',justifyContent:'flex-end',paddingRight:'8px',fontSize:'9px',color:'var(--text3)'}}>{fmtHour(hour)}</div>
                {days.map((d,di)=>(
                  <div key={di} className={`cal-week-cell${isSameDay(d,today)?' today-col':''}`}
                    style={{height:`${CELL_H}px`}}
                    onClick={()=>{const nd=new Date(d);nd.setHours(hour,0,0,0);setAddEventDate(nd);}}>
                  </div>
                ))}
              </React.Fragment>
            ))}
          </div>
          {/* Overlay events */}
          <div style={{display:'grid',gridTemplateColumns:'52px repeat(7,1fr)',minWidth:'700px',position:'absolute',top:'48px',left:0,right:0,height:`${CELL_H*24}px`,pointerEvents:'none'}}>
            <div></div>
            {days.map((d,di)=>{
              const dayEvs=eventsForDay(d).filter(e=>e.start?.dateTime);
              const {layout,totalCols}=layoutEvents(dayEvs);
              return (
                <div key={di} style={{position:'relative',height:`${CELL_H*24}px`,pointerEvents:'auto'}}>
                  {dayEvs.map((e,j)=>{
                    const es=new Date(e.start.dateTime);
                    const ee=e.end?.dateTime?new Date(e.end.dateTime):new Date(es.getTime()+3600000);
                    const top=(es.getHours()+es.getMinutes()/60)*CELL_H;
                    const height=Math.max(((ee-es)/3600000)*CELL_H,18);
                    const col=layout.get(e)||0;
                    const w=totalCols>1?`${88/totalCols}%`:'90%';
                    const left=totalCols>1?`${col*(88/totalCols)+2}%`:'4%';
                    const color=eventColor(e);
                    return (
                      <div key={j} onClick={()=>setEditEvent(e)}
                        style={{position:'absolute',top:`${top}px`,height:`${height}px`,left,width:w,
                          background:color+'33',color,border:`1px solid ${color}66`,
                          fontSize:'9px',padding:'2px 4px',overflow:'hidden',cursor:'pointer',
                          zIndex:10+col,boxSizing:'border-box',transition:'opacity 0.1s'}}
                        title={`${e.summary} (${fmtTime(es)}–${fmtTime(ee)})${e._calendarName?' · '+e._calendarName:''}`}
                        onMouseEnter={ev=>ev.currentTarget.style.opacity='0.75'}
                        onMouseLeave={ev=>ev.currentTarget.style.opacity='1'}>
                        <div style={{fontWeight:'600',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.summary}</div>
                        <div style={{opacity:0.8}}>{fmtTime(es)}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // DAY VIEW — absolute positioned with overlap stagger
  function DayView() {
    const dayEvs=eventsForDay(current);
    const timedEvs=dayEvs.filter(e=>e.start?.dateTime);
    const allDayEvs=dayEvs.filter(e=>!e.start?.dateTime&&e.start?.date);
    const {layout,totalCols}=layoutEvents(timedEvs);
    const CELL_H=56;
    return (
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 0 16px',borderBottom:'1px solid var(--border)',marginBottom:'8px'}}>
          <span style={{fontFamily:'Syne,sans-serif',fontSize:'18px',fontWeight:'700'}}>
            {current.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
          </span>
          <button className="btn-sm" onClick={()=>setAddEventDate(new Date(current))}>+ Add Event</button>
        </div>
        {allDayEvs.length>0&&(
          <div style={{marginBottom:'12px'}}>
            <div style={{fontSize:'10px',color:'var(--text3)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'6px'}}>All Day</div>
            {allDayEvs.map((e,i)=>(
              <div key={i} onClick={()=>setEditEvent(e)} style={{background:eventColor(e)+'22',color:eventColor(e),border:`1px solid ${eventColor(e)}44`,padding:'6px 10px',marginBottom:'4px',fontSize:'12px',cursor:'pointer'}}>
                {e.summary}
              </div>
            ))}
          </div>
        )}
        <div style={{position:'relative',overflowY:'auto',maxHeight:'75vh'}}>
          {HOURS.map(h=>(
            <div key={h} style={{display:'grid',gridTemplateColumns:'52px 1fr',height:`${CELL_H}px`,borderBottom:'1px solid var(--border)'}}>
              <div style={{fontSize:'9px',color:'var(--text3)',textAlign:'right',paddingRight:'8px',paddingTop:'4px',background:'var(--surface)',borderRight:'1px solid var(--border)'}}>{fmtHour(h)}</div>
              <div style={{cursor:'pointer',position:'relative'}} onClick={()=>{const nd=new Date(current);nd.setHours(h,0,0,0);setAddEventDate(nd);}}></div>
            </div>
          ))}
          {/* Overlay */}
          <div style={{position:'absolute',top:0,left:'52px',right:0,bottom:0,pointerEvents:'none'}}>
            {timedEvs.map((e,j)=>{
              const es=new Date(e.start.dateTime);
              const ee=e.end?.dateTime?new Date(e.end.dateTime):new Date(es.getTime()+3600000);
              const top=(es.getHours()+es.getMinutes()/60)*CELL_H;
              const height=Math.max(((ee-es)/3600000)*CELL_H,24);
              const col=layout.get(e)||0;
              const w=totalCols>1?`${94/totalCols}%`:'96%';
              const left=totalCols>1?`${col*(94/totalCols)+1}%`:'1%';
              const color=eventColor(e);
              return (
                <div key={j} onClick={()=>setEditEvent(e)}
                  style={{position:'absolute',top:`${top}px`,height:`${height}px`,left,width:w,
                    background:color+'33',color,border:`1px solid ${color}77`,
                    padding:'4px 8px',fontSize:'11px',cursor:'pointer',overflow:'hidden',
                    pointerEvents:'auto',zIndex:10+col,boxSizing:'border-box',transition:'opacity 0.1s'}}
                  onMouseEnter={ev=>ev.currentTarget.style.opacity='0.75'}
                  onMouseLeave={ev=>ev.currentTarget.style.opacity='1'}>
                  <div style={{fontWeight:'600'}}>{e.summary}</div>
                  <div style={{fontSize:'10px',opacity:0.8}}>{fmtTime(es)} → {fmtTime(ee)}</div>
                  {e._calendarName&&<div style={{fontSize:'9px',opacity:0.6}}>{e._calendarName}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  function navigate(dir) {
    const d=new Date(current);
    if(view==='month') d.setMonth(d.getMonth()+dir);
    else if(view==='week') d.setDate(d.getDate()+dir*7);
    else d.setDate(d.getDate()+dir);
    setCurrent(d);
  }

  function getLabel() {
    if(view==='month') return current.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if(view==='day') return current.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const s=new Date(current),day=s.getDay();
    s.setDate(s.getDate()-day+(day===0?-6:1));
    const e=new Date(s);e.setDate(s.getDate()+6);
    return `${s.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  }

  return (
    <div className="page" style={{paddingBottom:'60px'}}>
      <div className="cal-toolbar">
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={()=>navigate(-1)}>←</button>
          <div className="cal-month-label">{getLabel()}</div>
          <button className="cal-nav-btn" onClick={()=>navigate(1)}>→</button>
          <button className="cal-nav-btn" onClick={()=>setCurrent(new Date())}>Today</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <button className="btn-sm" onClick={()=>setAddEventDate(new Date())}>+ Add Event</button>

            {['month','week','day'].map(v=>(

            ))}

      {demoMode&&(
        <div style={{background:'rgba(255,179,71,0.08)',border:'1px solid rgba(255,179,71,0.2)',padding:'10px 14px',marginBottom:'16px',fontSize:'11px',color:'var(--warning)'}}>
          Demo mode — connect Google to see your real calendar events
        </div>
      )}
      {view==='month'&&<MonthView/>}
      {view==='week'&&<WeekView/>}
      {view==='day'&&<DayView/>}

        <AddEventModal date={addEventDate} onClose={()=>setAddEventDate(null)}

        <EditEventModal event={editEvent} onClose={()=>setEditEvent(null)}

}
// ── CHECK-IN PAGE ─────────────────────────────────────────────────────────────
function CheckInPage({ items, calEvents, goals, onGoalChange, onSave, onTasksGenerated, demoMode }) {
  const [aiState, setAiState]= useState({}); // track -> 'idle'|'loading'|'done'
  const [aiTasks, setAiTasks]= useState({}); // track -> array of tasks
  const [aiSlots, setAiSlots]= useState({}); // track -> {taskIndex -> slot}
  const [pendingSlots, setPendingSlots]= useState(null); // {track, tasks, slots} awaiting confirmation

  const prompts = {
    records:'What do you want to move forward? How does it connect to revenue?',
    publishing:"What's the publishing priority this week?",
    songstage:"Where does the product stand? What's the win this week?",
    freelance:"What's booked? Who do you need to reach out to?",
    content:'What are you publishing? (target: 2–3 short-form, 1 long-form, 1 Substack)',
  };

  async function breakdown(track) {
    const goal = goals[track];
    if (!goal?.trim()) return;
    setAiState(s=>({...s,[track]:'loading'}));
    try {
      const tasks = await breakdownGoalWithAI(track, goal, items[track]||[]);
      if (!tasks || tasks.length === 0) {
        setAiState(s=>({...s,[track]:'error',[track+'_err']:'No tasks returned — check browser console for details'}));
        return;
      }

      // Auto-assign calendar slots to each task based on estimated hours
      // Track used slots so tasks don't overlap
      const bookedSlots = [];
      const taskSlots = {};

      for (let i=0; i<tasks.length; i++) {
        const duration = tasks[i].estimatedHours || 1;
        const fakeBooked = bookedSlots.map(s=>({
          start:{dateTime:s.startISO}, end:{dateTime:s.endISO}, summary:'[HQ] Reserved'
        }));
        const available = getSmartSlots(track, [...calEvents, ...fakeBooked], duration);
        if (available.length > 0) {
          taskSlots[i] = available[0];
          bookedSlots.push(available[0]);
        }
      }

      setAiTasks(t=>({...t,[track]:tasks}));
      setAiSlots(s=>({...s,[track]:taskSlots}));
      setAiState(s=>({...s,[track]:'done'}));
    } catch(e) {
      console.error('breakdown error:', e);
      setAiState(s=>({...s,[track]:'error',[track+'_err']:e.message||String(e)}));
    }
  }

  function addTasksToTrack(track) {
    const tasks = aiTasks[track]||[];
    const slots = aiSlots[track]||{};
    onTasksGenerated(track, tasks, slots);
    setAiState(s=>({...s,[track]:'idle'}));
    setAiTasks(t=>({...t,[track]:[]}));
    setAiSlots(s=>({...s,[track]:{}}));
  }

  const staleByTrack = {};
  Object.entries(items).forEach(([track,trackItems])=>{
    staleByTrack[track]=trackItems.filter(i=>i.status!==TERMINAL[track]&&daysSince(i.dateAdded)>5);
  });

  // Upcoming calendar for context
  const thisWeekEvents = calEvents.filter(e=>{
    const start = e.start?.dateTime?new Date(e.start.dateTime):null;
    if (!start) return false;
    const now=new Date(), end=new Date(); end.setDate(now.getDate()+7);
    return start>=now&&start<=end;
  }).slice(0,5);

  return (
    <div className="page">
      <div className="checkin-wrap">
        <div className="checkin-intro">
          <div className="checkin-intro-title">Monday Check-In 🗓</div>
          <div className="checkin-intro-sub">Set goals, break them into tasks, block your week.</div>
        </div>

        {thisWeekEvents.length>0&&(
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'10px'}}>Already on your calendar this week</div>
            {thisWeekEvents.map((e,i)=>(
              <div key={i} style={{display:'flex',gap:'12px',fontSize:'12px',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{color:'var(--text3)',minWidth:'100px',fontSize:'10px'}}>
                  {e.start?.dateTime?`${fmtDate(new Date(e.start.dateTime))} ${fmtTime(new Date(e.start.dateTime))}`:'All day'}
                </div>
                <div>{e.summary}</div>
              </div>
            ))}
          </div>
        )}

        {Object.entries(TRACKS).map(([track,t])=>(
          <div key={track} className={`checkin-section ${track}`}>
            <div className="checkin-section-title" style={{color:t.color}}>{t.label}</div>
            <div className="checkin-section-sub">{prompts[track]}</div>
            {staleByTrack[track]?.length>0&&(
              <div className="stale-prompt">
                ⚠ Sitting 5+ days: {staleByTrack[track].map(i=>i.name).join(', ')}
              </div>
            )}
            <textarea className="form-textarea form-input" style={{marginBottom:'10px'}}
              placeholder={`What's the goal for ${t.label} this week?`}
              value={goals[track]||''} onChange={e=>onGoalChange(track,e.target.value)}/>

            {/* AI breakdown */}
            {goals[track]?.trim()&&(
              <div>
                {(!aiState[track]||aiState[track]==='idle')&&(
                  <button className="btn-sm" onClick={()=>breakdown(track)}>
                    ✦ Break into tasks with AI
                  </button>
                )}
                {aiState[track]==='loading'&&(
                  <div className="ai-thinking">
                    <div className="ai-dot"/> Breaking down your goal...
                  </div>
                )}
                {aiState[track]==='error'&&(
                  <div style={{background:'rgba(255,68,68,0.08)',border:'1px solid rgba(255,68,68,0.3)',padding:'10px 12px',fontSize:'11px',color:'#ff6666',marginBottom:'8px'}}>
                    ⚠ AI failed: {aiState[track+'_err'] || 'Unknown error'}
                    <button className="btn-sm" style={{marginLeft:'10px',fontSize:'10px'}} onClick={()=>setAiState(s=>({...s,[track]:'idle'}))}>Retry</button>
                  </div>
                )}
                {aiState[track]==='done'&&aiTasks[track]?.length>0&&(
                  <div>
                    <div className="ai-tasks">
                      {aiTasks[track].map((task,i)=>{
                        const slot = aiSlots[track]?.[i];
                        return (
                          <div key={i} className="ai-task">
                            <div className="ai-task-name">{task.name}</div>
                            <div className="ai-task-meta">{task.status} · ~{task.estimatedHours}h · {task.notes}</div>
                            {slot ? (
                              <div style={{marginTop:'6px',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                                <div style={{fontSize:'10px',color:'var(--accent)',background:'rgba(232,255,71,0.08)',border:'1px solid rgba(232,255,71,0.2)',padding:'3px 8px'}}>
                                  📅 {slot.label}
                                </div>
                                <select style={{fontFamily:'DM Mono,monospace',fontSize:'9px',background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text2)',padding:'3px 6px',cursor:'pointer'}}
                                  onChange={e=>{
                                    const idx = parseInt(e.target.value);
                                    const allSlots = getSmartSlots(track, calEvents, task.estimatedHours||1);
                                    if (idx >= 0 && allSlots[idx]) {
                                      setAiSlots(s=>({...s,[track]:{...s[track],[i]:allSlots[idx]}}));
                                    }
                                  }}>
                                  <option value={-1}>Change slot...</option>
                                  {getSmartSlots(track, calEvents, task.estimatedHours||1).slice(0,5).map((s,si)=>(
                                    <option key={si} value={si}>{s.label}</option>
                                  ))}
                                </select>
                              </div>
                            ) : (
                              <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'4px'}}>No available slot found this week</div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                      <button className="btn-primary" style={{fontSize:'11px',padding:'7px 14px'}} onClick={()=>addTasksToTrack(track)}>
                        Add {aiTasks[track].length} tasks + block calendar
                      </button>
                      <button className="btn-secondary" style={{fontSize:'11px',padding:'7px 14px'}} onClick={()=>setAiState(s=>({...s,[track]:'idle'}))}>
                        Dismiss
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}

        <button className="btn-primary" style={{width:'100%',marginTop:'8px',padding:'14px'}} onClick={onSave}>
          Lock In This Week →
        </button>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed]= useState(false);
  const [demoMode, setDemoMode]= useState(false);
  const [page, setPage]= useState('dashboard');
  const [items, setItems]= useState({records:[],publishing:[],songstage:[],freelance:[],content:[]});
  const [goals, setGoals]= useState({});
  const [calEvents, setCalEvents]= useState([]);
  const [loading, setLoading]= useState(false);
  const [modal, setModal]= useState(null);
  const [toast, setToast]= useState(null);
  const [newWeek, setNewWeek]= useState(false);
  const [sidebarOpen, setSidebarOpen]= useState(false);

  function showToast(msg) { setToast(msg); }

  useEffect(()=>{
    initGoogle(async resp=>{
      if (resp.error) return;
      setAuthed(true);
      await loadAllData();
    });
  },[]);

  useEffect(()=>{ if(demoMode){setItems(DEMO);setGoals({});setNewWeek(true);} },[demoMode]);

  async function loadAllData() {
    setLoading(true);
    const loaded={};
    for (const track of Object.keys(TRACKS)) {
      const rows = await readSheet(TRACKS[track].tab);
      loaded[track]=rows.map((r,i)=>rowToItem(track,r,i));
    }
    setItems(loaded);

    const thisWeek = getWeekLabel();
    const goalRows = await readSheet('Weekly Goals');
    const weekRow = goalRows.find(r=>r[0]===thisWeek);
    if (weekRow) {
      // Goals exist for this week — load them
      setGoals({records:weekRow[1]||'',publishing:weekRow[2]||'',songstage:weekRow[3]||'',freelance:weekRow[4]||'',content:weekRow[5]||''});
      setNewWeek(false);
    } else {
      // No goals for this week — it's a new week, clear goals and flag it
      setGoals({});
      setNewWeek(true);
    }

    const events=await getCalendarEvents(4);
    setCalEvents(events);
    setLoading(false);
  }

  async function handleAdd(track, formData) {
    const {name,type,status,extra,dueDate,notes,block,slot,
      taskType,coWriters,releaseDate,distributor,revenueStatus,
      writers,publisherSplit,pro,licenseType,revenueCollected,
      rate,invoiceStatus,hoursWorked}=formData;
    const dateAdded=new Date().toISOString().split('T')[0];
    // Build row based on track — extended columns
    let row;
    if (track==='records') {
      row=[name,type,status,extra,dueDate,notes,taskType||'Song/Project',dateAdded,coWriters||'',releaseDate||'',distributor||'',revenueStatus||''];
    } else if (track==='publishing') {
      row=[name,type,status,extra,dueDate,notes,taskType||'Song/Project',dateAdded,writers||'',publisherSplit||'',pro||'',licenseType||'',revenueCollected||''];
    } else if (track==='freelance') {
      row=[name,type,status,extra,dueDate,notes,'',dateAdded,rate||'',invoiceStatus||'',hoursWorked||''];
    } else {
      row=[name,type,status,extra,dueDate,notes,'',dateAdded];
    }
    if (!demoMode) await appendRow(TRACKS[track].tab, row);
    const newItem={id:items[track].length,name,type,status,extra,dueDate,notes,taskType:taskType||'',dateAdded,track};
    setItems(prev=>({...prev,[track]:[...prev[track],newItem]}));
    if (block&&slot&&!demoMode) {
      try {
        await createCalendarEvent(name,slot.startISO,slot.endISO,TRACK_COLORS_HEX[track]);
        const refreshed=await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✓ "${name}" added + time blocked ${slot.label}`);
      } catch(e) { showToast(`✓ "${name}" added — calendar block failed`); }
    } else { showToast(`✓ "${name}" added to ${TRACKS[track].label}`); }
  }

  async function handleEditCalEvent(ev) {
    if (!demoMode) {
      try {
        await gapi.client.calendar.events.update({
          calendarId: ev._calendarId || 'primary',
          eventId: ev.id,
          resource: { summary: ev.summary, start: ev.start, end: ev.end },
        });
        const refreshed = await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✓ "${ev.summary}" updated`);
      } catch(e) { showToast('Failed to update event'); }
    } else {
      setCalEvents(prev=>prev.map(e=>e===ev||e.summary===ev.summary?ev:e));
      showToast(`✓ "${ev.summary}" updated (demo)`);
    }
  }

  async function handleDeleteCalEvent(ev) {
    if (!window.confirm(`Delete "${ev.summary}"?`)) return;
    if (!demoMode) {
      try {
        await gapi.client.calendar.events.delete({ calendarId: ev._calendarId || 'primary', eventId: ev.id });
        const refreshed = await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✕ "${ev.summary}" deleted`);
      } catch(e) { showToast('Failed to delete event'); }
    } else {
      setCalEvents(prev=>prev.filter(e=>e!==ev));
      showToast(`✕ "${ev.summary}" deleted (demo)`);
    }
  }

  async function handleAddCalEvent(ev) {
    if (!demoMode) {
      try {
        await createCalendarEvent(ev.title,ev.startISO,ev.endISO,ev.color||'#888');
        const refreshed=await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✓ "${ev.title}" added to calendar`);
      } catch(e) { showToast('Failed to add calendar event'); }
    } else {
      // Demo: just add locally
      setCalEvents(prev=>[...prev,{
        summary:ev.title,
        start:{dateTime:ev.startISO},
        end:{dateTime:ev.endISO},
        _track:ev.track,
      }]);
      showToast(`✓ "${ev.title}" added (demo)`);
    }
  }

  async function handleStatusChange(track, item, newStatus) {
    if (!demoMode) await updateCell(TRACKS[track].tab,item.id,2,newStatus);
    setItems(prev=>({...prev,[track]:prev[track].map(i=>i.id===item.id?{...i,status:newStatus}:i)}));
    showToast(`↑ "${item.name}" → ${newStatus}`);
  }

  async function handleDelete(track, item) {
    if (!window.confirm(`Delete "${item.name}"?`)) return;
    if (!demoMode) await deleteRowFromSheet(TRACKS[track].tab,item.id);
    setItems(prev=>({...prev,[track]:prev[track].filter(i=>i.id!==item.id)}));
    showToast(`✕ "${item.name}" removed`);
  }

  async function handleMarkDone(track, item) { await handleStatusChange(track,item,TERMINAL[track]); }

  async function handleSaveGoals() {
    if (!demoMode) await appendRow('Weekly Goals',[getWeekLabel(),goals.records||'',goals.publishing||'',goals.songstage||'',goals.freelance||'',goals.content||'']);
    setNewWeek(false);
    showToast('✓ Goals locked in for the week');
    setPage('dashboard');
  }

  async function handleTasksGenerated(track, tasks, slots={}) {
    const dateAdded = new Date().toISOString().split('T')[0];
    const newItems = [];
    let blockedCount = 0;

    for (let i=0; i<tasks.length; i++) {
      const task = tasks[i];
      const taskType   = task.type   || TYPES[track][0];
      const taskStatus = task.status || STATUSES[track][0];
      const slot = slots[i];

      // Write to sheet
      const row = [task.name, taskType, taskStatus, '', slot?.label||'', task.notes||'', task.taskType||'', dateAdded];
      if (!demoMode) await appendRow(TRACKS[track].tab, row);

      // Block calendar if slot assigned
      if (slot && !demoMode) {
        try {
          await createCalendarEvent(task.name, slot.startISO, slot.endISO, TRACK_COLORS_HEX[track]);
          blockedCount++;
        } catch(e) { console.error('Calendar block failed for', task.name, e); }
      }

      newItems.push({
        id: items[track].length + newItems.length,
        name: task.name, type: taskType, status: taskStatus,
        extra: '', dueDate: slot?.label||'', notes: task.notes||'',
        dateAdded, track,
      });
    }

    setItems(prev => ({ ...prev, [track]: [...prev[track], ...newItems] }));

    // Refresh calendar to show new blocks
    if (blockedCount > 0 && !demoMode) {
      const refreshed = await getCalendarEvents(4);
      setCalEvents(refreshed);
      showToast(`✓ ${tasks.length} tasks added · ${blockedCount} time blocks created`);
    } else {
      showToast(`✓ ${tasks.length} tasks added to ${TRACKS[track].label}`);
    }
  }

  // AUTH SCREEN
  if (!authed&&!demoMode) {
    return (
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo">Jesse HQ</div>
          <div className="auth-tagline">Your command center across all five tracks</div>
          <div className="auth-features">
            {Object.entries(TRACKS).map(([key,t])=>(
              <div key={key} className="auth-feature">
                <div className="auth-feature-dot" style={{background:t.color}}/>{t.label}
              </div>
            ))}
          </div>
          <button className="google-btn" onClick={requestToken}>
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
            Sign in with Google
          </button>
          <button className="demo-btn" onClick={()=>setDemoMode(true)}>Try Demo Mode</button>
        </div>
      </div>
    );
  }

  const trackKeys=Object.keys(TRACKS);

  return (
    <div className="app">
      <div className={`sidebar-overlay${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="logo">
          <div className="logo-text">Jesse HQ</div>
          <div className="logo-sub">{demoMode?'Demo Mode':'Connected'}</div>
        </div>
        <nav className="nav">
          <div className="nav-section-label">Overview</div>
          {[['dashboard','Dashboard'],['calendar','Calendar'],['checkin','Monday Check-In']].map(([key,label])=>(
            <div key={key} className={`nav-item${page===key?' active':''}`} data-track={key} onClick={()=>{setPage(key);setSidebarOpen(false);}}>
              <div className={`nav-dot ${key}`}/>{label}
            </div>
          ))}
          <div className="nav-section-label" style={{marginTop:'8px'}}>Tracks</div>
          {Object.entries(TRACKS).map(([key,t])=>(
            <div key={key} className={`nav-item${page===key?' active':''}`} data-track={key} onClick={()=>{setPage(key);setSidebarOpen(false);}}>
              <div className={`nav-dot ${key}`}/>{t.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="auth-status">
            <div className={`auth-dot${authed?' connected':''}`}/>
            {authed?'Sheets + Calendar':demoMode?'Demo mode':'Not connected'}
          </div>
          {!authed&&!demoMode&&<button className="signin-btn" onClick={requestToken}>Connect Google</button>}
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
            <div className="topbar-title">
              {page==='dashboard'&&'Dashboard'}
              {page==='calendar'&&'Calendar'}
              {page==='checkin'&&'Monday Check-In'}
              {TRACKS[page]&&TRACKS[page].label}
            </div>
          </div>
          <div className="topbar-right">
            <span className="week-badge">{getWeekLabel()}</span>
            {trackKeys.includes(page)&&<button className="add-btn" onClick={()=>setModal({track:page})}>+ Add Item</button>}
          </div>
        </div>

        {page==='dashboard'&&<DashboardPage items={items} goals={goals} calEvents={calEvents} newWeek={newWeek} onCheckIn={()=>setPage('checkin')} onAddToWeek={(item)=>{setPage('checkin');showToast(`Adding "${item.name}" to weekly focus`);}}/>}
        {page==='calendar'&&<CalendarPage calEvents={calEvents} onAddEvent={handleAddCalEvent} onEditEvent={handleEditCalEvent} onDeleteEvent={handleDeleteCalEvent} demoMode={demoMode}/>}
        {page==='checkin'&&<CheckInPage items={items} calEvents={calEvents} goals={goals}
          onGoalChange={(track,val)=>setGoals(g=>({...g,[track]:val}))}
          onSave={handleSaveGoals}
          onTasksGenerated={handleTasksGenerated}
          demoMode={demoMode}/>}
        {trackKeys.includes(page)&&<TrackPage track={page} items={items[page]||[]} loading={loading}
          calEvents={calEvents}
          onAdd={()=>setModal({track:page})}
          onStatusChange={(item,status)=>handleStatusChange(page,item,status)}
          onDelete={(item)=>handleDelete(page,item)}
          onMarkDone={(item)=>handleMarkDone(page,item)}/>}
      </div>

      {modal&&<AddItemModal track={modal.track} calEvents={calEvents} onClose={()=>setModal(null)} onAdd={formData=>handleAdd(modal.track,formData)}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
