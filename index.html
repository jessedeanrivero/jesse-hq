// ── PERSONAL MODE PAGE ────────────────────────────────────────────────────────
function PersonalModePage({ onExitPersonal, onBeginWorkDay }) {
  const [tasks, setTasks] = useState(loadPersonalTasks);
  const [checked, setChecked] = useState(loadPersonalChecked);
  const [streaks, setStreaks] = useState(loadStreaks);
  const [reflection, setReflection] = useState('');
  const [showEditor, setShowEditor] = useState(false);
  const [shutdownLog] = useState(loadShutdownLog);

  const activeTasks = tasks.filter(t => t.active);
  const checkedCount = activeTasks.filter(t => checked[t.id]).length;
  const allDone = checkedCount === activeTasks.length && activeTasks.length > 0;

  // Begin Work Day logic — shows from 6am until startup is done
  const now = new Date();
  const hour = now.getHours();
  const startupDone = localStorage.getItem('hq_startup_done') === now.toDateString();
  const showBeginWork = hour >= 6 && !startupDone;

  function toggle(id) {
    const next = { ...checked, [id]: !checked[id] };
    setChecked(next);
    savePersonalChecked(next);
    const updated = updateStreaks(next, tasks);
    setStreaks(updated);
  }

  // Check for "free night" — any streak >= 7
  const freeNight = Object.entries(streaks).find(([id, s]) => s.count >= 7 && s.lastDate === todayKey());
  const freeNightTask = freeNight ? tasks.find(t => t.id === freeNight[0]) : null;

  // Group active tasks by category
  const byCategory = {};
  activeTasks.forEach(t => {
    if (!byCategory[t.category]) byCategory[t.category] = [];
    byCategory[t.category].push(t);
  });

  function toggleTaskActive(id) {
    const updated = tasks.map(t => t.id===id ? {...t, active:!t.active} : t);
    setTasks(updated);
    savePersonalTasks(updated);
  }

  const greeting = hour < 17 ? 'Evening starting' : hour < 20 ? 'Good evening' : 'Winding down';

  return (
    <div className="page" style={{maxWidth:'680px'}}>

      {/* ── BEGIN WORK DAY BANNER — shows from 6am until check-in done ── */}
      {showBeginWork && (
        <div className="begin-work-banner">
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'}}>
            <div style={{flex:1}}>
              <div className="begin-work-title">
                {hour < 9 ? 'Morning.' : hour < 12 ? 'Ready when you are.' : 'Still here.'}
              </div>
              <div className="begin-work-sub">
                {hour < 9
                  ? "New day. Your morning check-in is waiting — priorities and health, 2 minutes."
                  : hour < 12
                  ? "Your morning check-in is ready whenever you want to start the work day."
                  : "You haven't done your morning check-in yet. No pressure — it's still useful mid-day."}
              </div>

              {/* Show yesterday's top 3 if they exist */}
              {shutdownLog?.top3?.some(t=>t) && (
                <div className="begin-work-top3">
                  <div style={{fontSize:'9px',letterSpacing:'2px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'8px'}}>
                    You said these mattered today:
                  </div>
                  {shutdownLog.top3.filter(t=>t).map((item,i) => (
                    <div key={i} className="begin-work-top3-item">
                      <span className="begin-work-top3-num">{i+1}.</span>
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <button className="begin-work-btn" onClick={onBeginWorkDay}>
            Begin Work Day →
          </button>
        </div>
      )}

      {/* Free night banner */}
      {freeNightTask && (
        <div className="free-night-banner">
          <div className="free-night-title">7 days straight — take tonight off.</div>
          <div className="free-night-sub">
            You've hit {freeNightTask.label.toLowerCase()} for a week. That's real consistency.
            Tonight is yours — no checklist needed.
          </div>
        </div>
      )}

      {/* Hero */}
      <div className="personal-hero">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'16px'}}>
          <div>
            <div className="personal-hero-title">Personal Mode</div>
            <div className="personal-hero-sub">
              {greeting} · Work is closed · Focus on what matters now
            </div>
          </div>
          <button
            className="end-workday-btn"
            onClick={onExitPersonal}
            style={{fontSize:'10px',marginTop:'4px',whiteSpace:'nowrap'}}
          >↩ Back to Work</button>
        </div>

        {/* Yesterday's top 3 carried forward */}
        {shutdownLog?.top3?.some(t=>t) && (
          <div style={{marginTop:'16px',paddingTop:'14px',borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:'9px',letterSpacing:'2px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'8px'}}>Tomorrow's focus (set at shutdown)</div>
            {shutdownLog.top3.filter(t=>t).map((item,i) => (
              <div key={i} style={{fontSize:'12px',color:'var(--text2)',padding:'3px 0',display:'flex',gap:'8px'}}>
                <span style={{color:'var(--text3)'}}>{i+1}.</span> {item}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Progress */}
      <div>
        <div className="personal-progress-label">
          <span style={{color:'var(--text2)'}}>{checkedCount} of {activeTasks.length} done</span>
          {allDone && <span style={{color:'var(--accent)'}}>✓ All in</span>}
        </div>
        <div className="personal-progress-bar">
          <div className="personal-progress-fill"
            style={{width:`${activeTasks.length>0?(checkedCount/activeTasks.length)*100:0}%`}}/>
        </div>
      </div>

      {/* Streaks row */}
      {Object.entries(streaks).filter(([,s])=>s.count>1&&s.lastDate===todayKey()).length > 0 && (
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'20px'}}>
          {Object.entries(streaks)
            .filter(([,s])=>s.count>1&&s.lastDate===todayKey())
            .map(([id,s]) => {
              const task = tasks.find(t=>t.id===id);
              if (!task) return null;
              return (
                <div key={id} className="streak-badge">
                  {task.label.split(' ').slice(0,2).join(' ')} · {s.count}d
                </div>
              );
            })}
        </div>
      )}

      {/* Task categories */}
      {Object.entries(PERSONAL_CATEGORY_LABELS).map(([cat, label]) => {
        const catTasks = byCategory[cat] || [];
        if (catTasks.length === 0) return null;
        return (
          <div key={cat} className="personal-category">
            <div className="personal-category-label">
              <span>{label}</span>
              <button className="personal-task-edit-btn" onClick={()=>setShowEditor(e=>!e)}>
                {showEditor ? 'Done' : 'Edit'}
              </button>
            </div>
            {catTasks.map(task => {
              const streak = streaks[task.id];
              const hasStreak = streak && streak.count > 1 && streak.lastDate === todayKey();
              return (
                <div key={task.id} className="personal-task-row">
                  {showEditor ? (
                    <>
                      <div className={`personal-task-label`} style={{opacity:task.active?1:0.4}}>{task.label}</div>
                      <button
                        className="personal-task-edit-btn"
                        onClick={()=>toggleTaskActive(task.id)}
                      >{task.active ? 'Remove' : 'Add'}</button>
                    </>
                  ) : (
                    <>
                      <div
                        className={`personal-check${checked[task.id]?' checked':''}`}
                        onClick={()=>toggle(task.id)}
                      >{checked[task.id]?'✓':''}</div>
                      <div className={`personal-task-label${checked[task.id]?' checked':''}`}>
                        {task.label}
                      </div>
                      {hasStreak && (
                        <div className="streak-badge">{streak.count}d</div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Optional reflection */}
      {allDone && (
        <div className="personal-reflection">
          <div style={{fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--text3)',marginBottom:'12px'}}>
            Optional · End of day note
          </div>
          <textarea
            className="win-input"
            style={{minHeight:'80px',background:'var(--surface2)'}}
            placeholder="Anything worth remembering from today..."
            value={reflection}
            onChange={e=>setReflection(e.target.value)}
          />
          <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'8px'}}>Good day. Rest well.</div>
        </div>
      )}
    </div>
  );
}

// ── MORNING STARTUP MODAL ─────────────────────────────────────────────────────
function MorningStartup({ items, goals, onComplete }) {
  const [step, setStep] = React.useState(0); // 0 = priorities, 1 = health
  const [kept, setKept] = React.useState({});   // id -> true/false
  const [dropped, setDropped] = React.useState({});
  const [workout, setWorkout] = React.useState(null);
  const [sleep, setSleep] = React.useState(null);
  const [weight, setWeight] = React.useState('');
  const [note, setNote] = React.useState('');

  const now = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = dayNames[now.getDay()];
  const DAY_THEMES = {
    Monday:    { label:'Real Fun Day', tracks:['records','publishing'] },
    Tuesday:   { label:'Real Fun + Songstage', tracks:['records','publishing','songstage'] },
    Wednesday: { label:'Freelance Day', tracks:['freelance'] },
    Thursday:  { label:'Freelance Day', tracks:['freelance'] },
    Friday:    { label:'Songstage Day', tracks:['songstage'] },
    Saturday:  { label:'Off', tracks:[] },
    Sunday:    { label:'Off', tracks:[] },
  };
  const theme = DAY_THEMES[dayName] || { tracks:[] };
  const allItems = Object.values(items).flat();

  function isDone(item) { return (DONE_STATUSES[item.track]||[]).includes(item.status); }
  function scoreItem(item) {
    if (!item.dueDate) return 0;
    const diff = Math.ceil((new Date(item.dueDate+'T12:00:00') - now) / 86400000);
    if (diff < 0) return 100 + Math.abs(diff);
    if (diff <= 2) return 80;
    if (diff <= 7) return 50;
    return 10;
  }

  // Surface top items across today's tracks + any overdue from other tracks
  const todayItems = allItems
    .filter(i => !isDone(i) && theme.tracks.includes(i.track))
    .sort((a,b) => scoreItem(b) - scoreItem(a))
    .slice(0, 5);

  const overdueOther = allItems
    .filter(i => !isDone(i) && !theme.tracks.includes(i.track) && i.dueDate && new Date(i.dueDate+'T12:00:00') < now)
    .sort((a,b) => scoreItem(b) - scoreItem(a))
    .slice(0, 2);

  const priorityList = [...todayItems, ...overdueOther];

  function toggleKept(id) {
    setKept(k => ({...k, [id]: !k[id]}));
    setDropped(d => ({...d, [id]: false}));
  }
  function toggleDropped(id) {
    setDropped(d => ({...d, [id]: !d[id]}));
    setKept(k => ({...k, [id]: false}));
  }

  const WORKOUT_OPTIONS = ['Morning — before work','Midday break','After 4:30','Already done ✓','Rest day today'];
  const SLEEP_OPTIONS = [
    { label:'Great 😌', cls:'selected-good' },
    { label:'Decent 😐', cls:'selected' },
    { label:'Rough 😞', cls:'selected-warn' },
    { label:'Barely slept 💀', cls:'selected-bad' },
  ];

  function finish() {
    const healthData = { workout, sleep, weight, note, date: now.toDateString() };
    localStorage.setItem('hq_health_today', JSON.stringify(healthData));
    localStorage.setItem('hq_startup_done', now.toDateString());
    const droppedIds = Object.keys(dropped).filter(id => dropped[id]);
    onComplete({ healthData, droppedIds });
  }

  const steps = ['Priorities','Health'];

  return (
    <div className="startup-overlay">
      <div className="startup-modal">
        <div className="startup-header">
          <div className="startup-step-dots">
            {steps.map((s,i) => (
              <div key={i} className={`startup-step-dot${i===step?' active':i<step?' done':''}`}/>
            ))}
            <span style={{fontSize:'10px',color:'var(--text3)',marginLeft:'8px',letterSpacing:'2px',textTransform:'uppercase'}}>
              {steps[step]} · {step+1} of {steps.length}
            </span>
          </div>

          {step === 0 && <>
            <div className="startup-title">Good morning.</div>
            <div className="startup-sub">
              It's {dayName} — {theme.label || 'open day'}. Here's what's on your plate. Keep what matters, drop what doesn't.
            </div>
          </>}
          {step === 1 && <>
            <div className="startup-title">Quick health check.</div>
            <div className="startup-sub">
              30 seconds. Helps the system protect what matters.
            </div>
          </>}
        </div>

        <div className="startup-body">
          {/* ── STEP 0: Priority confirm ── */}
          {step === 0 && (
            <div>
              {priorityList.length === 0 && (
                <div style={{fontSize:'12px',color:'var(--text3)',padding:'16px 0'}}>
                  Nothing queued for today's tracks. Clean slate — set your focus in Monday Check-In.
                </div>
              )}
              {priorityList.map((item, i) => {
                const id = `${item.track}::${item.name}`;
                const isKept = kept[id];
                const isDropped = dropped[id];
                const isOverdue = item.dueDate && new Date(item.dueDate+'T12:00:00') < now;
                const isOtherTrack = !theme.tracks.includes(item.track);
                return (
                  <div key={id} className="startup-priority-row" style={{opacity: isDropped ? 0.35 : 1, transition:'opacity 0.2s'}}>
                    <div style={{flex:1}}>
                      <div className="startup-priority-name" style={{textDecoration: isDropped?'line-through':'none'}}>
                        {item.name}
                      </div>
                      <div className="startup-priority-meta">
                        <span style={{color: TRACKS[item.track]?.color}}>{TRACKS[item.track]?.label}</span>
                        {' · '}{item.status}
                        {isOverdue && <span style={{color:'#ff4444',marginLeft:'6px'}}>⚠ Overdue</span>}
                        {isOtherTrack && <span style={{color:'var(--warning)',marginLeft:'6px'}}>Not today's track</span>}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                      <button
                        className={`startup-keep-btn${isKept?' kept':''}`}
                        onClick={()=>toggleKept(id)}
                      >{isKept ? '✓ In' : 'Keep'}</button>
                      <button
                        className={`startup-drop-btn${isDropped?' dropped':''}`}
                        onClick={()=>toggleDropped(id)}
                      >{isDropped ? '✕ Out' : 'Drop'}</button>
                    </div>
                  </div>
                );
              })}
              {priorityList.length > 0 && (
                <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'16px',paddingTop:'12px',borderTop:'1px solid var(--border)'}}>
                  Dropped items stay in your tracks — they just won't show as today's priorities.
                </div>
              )}
            </div>
          )}

          {/* ── STEP 1: Health check-in ── */}
          {step === 1 && (
            <div>
              <div className="health-option-group">
                <div className="health-option-label">Workout — when are you fitting it in?</div>
                <div className="health-options">
                  {WORKOUT_OPTIONS.map(o => (
                    <button key={o} className={`health-opt${workout===o?' selected':''}`} onClick={()=>setWorkout(o)}>{o}</button>
                  ))}
                </div>
              </div>

              <div className="health-option-group">
                <div className="health-option-label">How'd you sleep?</div>
                <div className="health-options">
                  {SLEEP_OPTIONS.map(o => (
                    <button key={o.label}
                      className={`health-opt${sleep===o.label?' '+o.cls:''}`}
                      onClick={()=>setSleep(o.label)}
                    >{o.label}</button>
                  ))}
                </div>
              </div>

              <div className="health-option-group">
                <div className="health-option-label">Weight (optional)</div>
                <input
                  className="health-note-input"
                  style={{minHeight:'unset',height:'38px'}}
                  placeholder="e.g. 182"
                  value={weight}
                  onChange={e=>setWeight(e.target.value)}
                />
              </div>

              <div className="health-option-group">
                <div className="health-option-label">Anything else to protect today?</div>
                <textarea
                  className="health-note-input"
                  placeholder="e.g. Back is tight, skip heavy lifting / Feeling anxious, keep schedule light..."
                  value={note}
                  onChange={e=>setNote(e.target.value)}
                />
              </div>
            </div>
          )}
        </div>

        <div className="startup-footer">
          {step === 0 && (
            <>
              <button className="btn-secondary" style={{fontSize:'11px'}} onClick={finish}>Skip both →</button>
              <button className="btn-primary" onClick={()=>setStep(1)}>Next — Health check →</button>
            </>
          )}
          {step === 1 && (
            <>
              <button className="btn-secondary" style={{fontSize:'11px'}} onClick={()=>setStep(0)}>← Back</button>
              <button className="btn-primary" onClick={finish}>Start the day →</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── TODAY PAGE ─────────────────────────────────────────────────────────────────
function TodayPage({ items, goals, calEvents, onMarkDone, onEdit, onGoToCheckin, onEndWorkday }) {
  const now = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = dayNames[now.getDay()];
  const daySchedule = DAY_SCHEDULE[dayName] || [];

  // Today's track theme
  const todayTracks = [...new Set(daySchedule.map(s => s.track))];

  const DAY_THEMES = {
    Monday:    { label:'Real Fun Day', tracks:['records','publishing'], color:'var(--records)' },
    Tuesday:   { label:'Real Fun + Songstage', tracks:['records','publishing','songstage'], color:'var(--songstage)' },
    Wednesday: { label:'Freelance Day', tracks:['freelance'], color:'var(--freelance)' },
    Thursday:  { label:'Freelance Day', tracks:['freelance'], color:'var(--freelance)' },
    Friday:    { label:'Songstage Day', tracks:['songstage'], color:'var(--songstage)' },
    Saturday:  { label:'Off', tracks:[], color:'var(--text3)' },
    Sunday:    { label:'Off', tracks:[], color:'var(--text3)' },
  };
  const theme = DAY_THEMES[dayName] || { label:'Open', tracks:[], color:'var(--accent)' };

  // ── Morning startup state ──
  function startupDoneToday() {
    return localStorage.getItem('hq_startup_done') === now.toDateString();
  }
  function getHealthToday() {
    try { const d = JSON.parse(localStorage.getItem('hq_health_today')||'{}'); return d.date===now.toDateString()?d:null; } catch(e){return null;}
  }

  const [showStartup, setShowStartup] = React.useState(!startupDoneToday());
  const [healthData, setHealthData] = React.useState(getHealthToday());
  const [droppedToday, setDroppedToday] = React.useState({});
  const [showReprioritize, setShowReprioritize] = React.useState(false);

  function handleStartupComplete({ healthData: hd, droppedIds }) {
    setHealthData(hd);
    const dropped = {};
    droppedIds.forEach(id => { dropped[id] = true; });
    setDroppedToday(dropped);
    setShowStartup(false);
  }

  // Workout status color
  function workoutColor(w) {
    if (!w) return 'var(--text3)';
    if (w.includes('Already done')) return 'var(--success)';
    if (w.includes('Rest day')) return 'var(--text3)';
    return 'var(--accent)';
  }
  function sleepColor(s) {
    if (!s) return 'var(--text3)';
    if (s.includes('Great')) return 'var(--success)';
    if (s.includes('Decent')) return 'var(--accent)';
    if (s.includes('Rough')) return 'var(--warning)';
    return '#ff4444';
  }

  // Checked-off state (local only — resets daily, just UI)
  const [checked, setChecked] = React.useState({});
  const [energy, setEnergy] = React.useState(null);

  function toggleCheck(id) {
    setChecked(c => ({...c, [id]: !c[id]}));
  }

  // Build today's priorities: items from today's tracks, filtered by overdue/due-soon/stale
  const allItems = Object.values(items).flat();

  // Score items: overdue > due today/tomorrow > stale > in-progress
  function scoreItem(item) {
    if (!item.dueDate) return 0;
    const due = new Date(item.dueDate + 'T12:00:00');
    const diff = Math.ceil((due - now) / 86400000);
    if (diff < 0) return 100 + Math.abs(diff); // overdue — highest priority
    if (diff <= 2) return 80;
    if (diff <= 7) return 50;
    return 10;
  }

  function isDone(item) {
    return (DONE_STATUSES[item.track] || []).includes(item.status);
  }

  // Today's track-specific items
  const todayTrackItems = allItems.filter(i =>
    theme.tracks.includes(i.track) && !isDone(i)
  ).sort((a,b) => scoreItem(b) - scoreItem(a));

  // Top 3 work priorities from today's tracks
  const topPriorities = todayTrackItems.slice(0, 3);

  // Revenue-driving items (freelance invoiced/booked, records items with dueDate soon)
  const revItems = allItems.filter(i =>
    !isDone(i) &&
    (i.track === 'freelance' && ['Booked','In Progress'].includes(i.status))
  ).slice(0, 2);

  // One content item if it's not a content-theme day
  const contentItem = !theme.tracks.includes('content')
    ? allItems.filter(i => i.track === 'content' && !isDone(i) && ['In Progress','Planned'].includes(i.status))[0]
    : null;

  // Overload check: too many calendar events + too many priorities
  const todayCalEvents = calEvents.filter(e => {
    if (!e.start?.dateTime) return false;
    return isSameDay(new Date(e.start.dateTime), now);
  });
  const isOverloaded = todayCalEvents.length >= 4 || topPriorities.length > 5;

  // What to ignore today: items NOT from today's tracks that are trying to creep in
  const ignoreItems = allItems.filter(i =>
    !isDone(i) &&
    !theme.tracks.includes(i.track) &&
    i.dueDate && (() => {
      const d = new Date(i.dueDate + 'T12:00:00');
      return d > now && Math.ceil((d - now)/86400000) <= 3;
    })()
  ).slice(0, 3);

  // Next calendar events today
  const upcomingToday = calEvents.filter(e => {
    if (!e.start?.dateTime) return false;
    const start = new Date(e.start.dateTime);
    return isSameDay(start, now) && start >= now;
  }).sort((a,b) => new Date(a.start.dateTime) - new Date(b.start.dateTime)).slice(0, 5);

  // Detect calendar track from event summary
  function getEventTrackColor(event) {
    const title = (event.summary || '').toLowerCase();
    if (title.includes('records') || title.includes('real fun') || title.includes('[hq]')) {
      if (title.includes('publishing')) return 'var(--publishing)';
      return 'var(--records)';
    }
    if (title.includes('songstage')) return 'var(--songstage)';
    if (title.includes('freelance') || title.includes('session') || title.includes('coaching')) return 'var(--freelance)';
    if (title.includes('content') || title.includes('youtube') || title.includes('substack')) return 'var(--content)';
    return event._calendarColor || 'var(--text3)';
  }

  const priorityId = (track, name) => `${track}::${name}`;

  // Filter out dropped items from today's priorities
  function isDroppedToday(item) {
    return droppedToday[`${item.track}::${item.name}`];
  }

  const filteredTopPriorities = topPriorities.filter(i => !isDroppedToday(i));

  return (
    <div className="page">
      {/* Morning startup modal */}
      {showStartup && (
        <MorningStartup items={items} goals={goals} onComplete={handleStartupComplete}/>
      )}

      {/* Hero / day theme */}
      <div className="today-hero">
        <div>
          <div className="today-day-label">{dayName}</div>
          <div className="today-day-sub">
            {now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · Cutoff at 4:30 PM
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'8px'}}>
          <div className="today-theme-badge" style={{color:theme.color,borderColor:theme.color}}>
            {theme.label}
          </div>
          {theme.tracks.length > 0 && (
            <div style={{display:'flex',gap:'6px'}}>
              {theme.tracks.map(t => (
                <div key={t} style={{width:'8px',height:'8px',borderRadius:'50%',background:TRACKS[t]?.color||'var(--text3)'}}/>
              ))}
            </div>
          )}
          <button className="end-workday-btn" onClick={onEndWorkday}>End Workday →</button>
        </div>
      </div>

      {/* Health bar — shows after startup complete */}
      {healthData && !showStartup && (
        <div className="health-bar">
          {healthData.workout && (
            <div className="health-bar-item">
              <div className="health-bar-dot" style={{background:workoutColor(healthData.workout)}}/>
              <div>
                <div className="health-bar-label">Workout</div>
                <div className="health-bar-val">{healthData.workout}</div>
              </div>
            </div>
          )}
          {healthData.sleep && (
            <div className="health-bar-item">
              <div className="health-bar-dot" style={{background:sleepColor(healthData.sleep)}}/>
              <div>
                <div className="health-bar-label">Sleep</div>
                <div className="health-bar-val">{healthData.sleep}</div>
              </div>
            </div>
          )}
          {healthData.weight && (
            <div className="health-bar-item">
              <div className="health-bar-dot" style={{background:'var(--text3)'}}/>
              <div>
                <div className="health-bar-label">Weight</div>
                <div className="health-bar-val">{healthData.weight} lbs</div>
              </div>
            </div>
          )}
          {healthData.note && (
            <div className="health-bar-item" style={{flex:1}}>
              <div className="health-bar-dot" style={{background:'var(--text3)'}}/>
              <div>
                <div className="health-bar-label">Note</div>
                <div className="health-bar-val" style={{fontSize:'10px'}}>{healthData.note}</div>
              </div>
            </div>
          )}
          <button className="health-bar-edit" onClick={()=>setShowStartup(true)}>Edit</button>
        </div>
      )}

      {/* Low sleep warning */}
      {healthData?.sleep && (healthData.sleep.includes('Rough') || healthData.sleep.includes('Barely')) && (
        <div className="overload-warning" style={{borderColor:'rgba(255,179,71,0.3)',marginBottom:'16px'}}>
          😞 Rough sleep — protect your top 1 priority and keep the day lighter than you think you can handle.
        </div>
      )}

      {isOverloaded && (
        <div className="overload-warning">
          ⚠ Heavy day — {todayCalEvents.length} calendar events. Consider dropping or moving one priority.
        </div>
      )}

      {/* Reprioritize banner — only after 11am so it doesn't nag immediately after morning startup */}
      {!showStartup && now.getHours() >= 11 && (
        <div className="reprioritize-banner">
          <span style={{color:'var(--text2)'}}>Day not going as planned?</span>
          <button onClick={()=>setShowStartup(true)}>Reprioritize →</button>
        </div>
      )}

      <div className="today-grid">
        {/* Left: Today's priorities */}
        <div>
          <div className="today-focus-full">
            <div className="today-section-title">
              <span>Today's Priorities</span>
              <span style={{color:'var(--text3)',fontSize:'9px'}}>{theme.tracks.map(t=>TRACKS[t]?.label).join(' · ')}</span>
            </div>
            {filteredTopPriorities.length === 0 && theme.tracks.length > 0 && (
              <div style={{fontSize:'12px',color:'var(--text3)',padding:'8px 0'}}>
                No active items for today's tracks — or you dropped them all. Good time to check in.
              </div>
            )}
            {theme.tracks.length === 0 && (
              <div style={{fontSize:'12px',color:'var(--text3)',padding:'8px 0'}}>
                It's the weekend. No work tracks scheduled.
              </div>
            )}
            {filteredTopPriorities.map(item => {
              const id = priorityId(item.track, item.name);
              const isDue = item.dueDate && (() => {
                const d = new Date(item.dueDate+'T12:00:00');
                const diff = Math.ceil((d-now)/86400000);
                return { overdue: diff < 0, soon: diff <= 2, diff };
              })();
              return (
                <div key={id} className="priority-item">
                  <div
                    className={`priority-check${checked[id]?' done':''}`}
                    onClick={()=>toggleCheck(id)}
                  >{checked[id]?'✓':''}</div>
                  <div className="priority-track-dot" style={{background:TRACKS[item.track]?.color}}/>
                  <div style={{flex:1}}>
                    <div className={`priority-label${checked[id]?' done':''}`}>{item.name}</div>
                    <div className="priority-meta">
                      {TRACKS[item.track]?.label}
                      {item.status && ` · ${item.status}`}
                      {isDue && isDue.overdue && <span style={{color:'#ff4444',marginLeft:'6px'}}>⚠ Overdue</span>}
                      {isDue && !isDue.overdue && isDue.soon && <span style={{color:'var(--warning)',marginLeft:'6px'}}>⏰ Due soon</span>}
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Revenue item */}
            {revItems.length > 0 && (
              <>
                <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--success)',margin:'16px 0 10px',paddingTop:'12px',borderTop:'1px solid var(--border)'}}>Revenue Priority</div>
                {revItems.filter(i=>!isDroppedToday(i)).map(item => {
                  const id = priorityId(item.track, item.name)+'_rev';
                  return (
                    <div key={id} className="priority-item">
                      <div className={`priority-check${checked[id]?' done':''}`} onClick={()=>toggleCheck(id)}>{checked[id]?'✓':''}</div>
                      <div className="priority-track-dot" style={{background:'var(--success)'}}/>
                      <div style={{flex:1}}>
                        <div className={`priority-label${checked[id]?' done':''}`}>{item.name}</div>
                        <div className="priority-meta">{TRACKS[item.track]?.label} · {item.status}</div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {/* Content item if not a content day */}
            {contentItem && !isDroppedToday(contentItem) && (
              <>
                <div style={{fontSize:'9px',letterSpacing:'3px',textTransform:'uppercase',color:'var(--content)',margin:'16px 0 10px',paddingTop:'12px',borderTop:'1px solid var(--border)'}}>Content</div>
                {(() => {
                  const id = priorityId('content', contentItem.name)+'_c';
                  return (
                    <div className="priority-item">
                      <div className={`priority-check${checked[id]?' done':''}`} onClick={()=>toggleCheck(id)}>{checked[id]?'✓':''}</div>
                      <div className="priority-track-dot" style={{background:'var(--content)'}}/>
                      <div style={{flex:1}}>
                        <div className={`priority-label${checked[id]?' done':''}`}>{contentItem.name}</div>
                        <div className="priority-meta">Content · {contentItem.status}</div>
                      </div>
                    </div>
                  );
                })()}
              </>
            )}
          </div>

          {/* Ignore today */}
          {ignoreItems.length > 0 && (
            <div className="today-section" style={{marginTop:'0'}}>
              <div className="today-section-title"><span>Leave Alone Today</span></div>
              {ignoreItems.map((item,i) => (
                <div key={i} className="ignore-item">
                  <span style={{color:TRACKS[item.track]?.color,fontSize:'10px'}}>{TRACKS[item.track]?.label}</span>
                  <span>{item.name}</span>
                </div>
              ))}
              <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'10px'}}>Not today's tracks. Still there tomorrow.</div>
            </div>
          )}
        </div>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          {/* Energy check-in */}
          <div className="today-section">
            <div className="today-section-title"><span>Energy Check</span></div>
            <div className="today-energy">
              {['🔋 High','⚡ Medium','😴 Low','🔥 In the zone'].map(e => (
                <button key={e} className={`energy-btn${energy===e?' active':''}`} onClick={()=>setEnergy(e)}>{e}</button>
              ))}
            </div>
            {energy === '😴 Low' && (
              <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'12px',paddingTop:'10px',borderTop:'1px solid var(--border)'}}>
                Low energy — protect the top 1 priority and let the rest wait.
              </div>
            )}
          </div>

          {/* Today's calendar */}
          <div className="today-section">
            <div className="today-section-title"><span>On Your Calendar Today</span></div>
            {upcomingToday.length === 0
              ? <div style={{fontSize:'12px',color:'var(--text3)'}}>Nothing scheduled yet today.</div>
              : upcomingToday.map((e,i) => (
                <div key={i} className="cal-event-row">
                  <div className="cal-event-track-bar" style={{background:getEventTrackColor(e)}}/>
                  <div className="cal-event-time">{fmtTime(new Date(e.start.dateTime))}</div>
                  <div className="cal-event-name">{e.summary}</div>
                </div>
              ))}
            {todayCalEvents.length === 0 && upcomingToday.length === 0 && (
              <div style={{fontSize:'10px',color:'var(--text3)',marginTop:'8px'}}>Connect Google Calendar to see today's events here.</div>
            )}
          </div>

          {/* Weekly goals for today's tracks */}
          {theme.tracks.some(t => goals[t]) && (
            <div className="today-section">
              <div className="today-section-title"><span>This Week's Goal</span></div>
              {theme.tracks.filter(t => goals[t]).map(t => (
                <div key={t} style={{marginBottom:'10px'}}>
                  <div style={{fontSize:'10px',color:TRACKS[t]?.color,marginBottom:'4px',letterSpacing:'1px',textTransform:'uppercase'}}>{TRACKS[t]?.label}</div>
                  <div style={{fontSize:'12px',color:'var(--text2)',lineHeight:'1.5'}}>{goals[t]}</div>
                </div>
              ))}
            </div>
          )}

          {/* No goals nudge */}
          {theme.tracks.length > 0 && !theme.tracks.some(t => goals[t]) && (
            <div style={{background:'rgba(232,255,71,0.05)',border:'1px solid rgba(232,255,71,0.2)',padding:'16px',fontSize:'12px',color:'var(--text2)'}}>
              No weekly goals set for today's tracks.
              <button className="btn-sm" style={{marginLeft:'10px'}} onClick={onGoToCheckin}>Set Goals</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed]= useState(false);
  const [demoMode, setDemoMode]= useState(false);
  const [page, setPage]= useState('today');
  const [items, setItems]= useState({records:[],publishing:[],songstage:[],freelance:[],content:[]});
  const [goals, setGoals]= useState({});
  const [calEvents, setCalEvents]= useState([]);
  const [calendarList, setCalendarList]= useState([]); // all user's calendars
  const [loading, setLoading]= useState(false);
  const [modal, setModal]= useState(null);
  const [toast, setToast]= useState(null);
  const [undoToast, setUndoToast]= useState(null); // {message, onUndo}
  const [newWeek, setNewWeek]= useState(false);
  const [sidebarOpen, setSidebarOpen]= useState(false);
  // Shutdown / personal mode
  const [appMode, setAppMode] = useState(() => {
    // Restore personal mode if user was in it when they last closed the app (same day)
    try {
      const saved = localStorage.getItem('hq_app_mode');
      const savedDate = localStorage.getItem('hq_app_mode_date');
      if (saved === 'personal' && savedDate === todayKey()) return 'personal';
    } catch {}
    return 'work';
  }); // 'work' | 'shutting_down' | 'transitioning' | 'personal'

  useEffect(() => {
    document.body.classList.toggle('personal-mode', appMode === 'personal');
  }, [appMode]);

  function handleEndWorkday() { setAppMode('shutting_down'); }

  function handleShutdownComplete() {
    setAppMode('transitioning');
  }

  function handleTransitionDone() {
    setAppMode('personal');
    setPage('personal');
    try {
      localStorage.setItem('hq_app_mode', 'personal');
      localStorage.setItem('hq_app_mode_date', todayKey());
    } catch {}
  }

  function handleExitPersonal() {
    setAppMode('work');
    setPage('today');
    try { localStorage.removeItem('hq_app_mode'); } catch {}
  }

  function handleBeginWorkDay() {
    // Exit personal mode, go to Today — morning startup modal will fire automatically
    // since hq_startup_done won't be set yet
    setAppMode('work');
    setPage('today');
    try { localStorage.removeItem('hq_app_mode'); } catch {}
  }

  function showToast(msg) { setToast(msg); }
  function showUndoToast(message, onUndo) {
    setUndoToast({ message, onUndo });
    setTimeout(()=>setUndoToast(null), 5500);
  }

  useEffect(()=>{
    initGoogle(async resp=>{
      if (resp.error) return;
      setAuthed(true);
      await loadAllData();
    });
  },[]);

  useEffect(()=>{ if(demoMode){setItems(DEMO);setGoals({});setNewWeek(true);} },[demoMode]);

  async function loadAllData() {
    setLoading(true);
    const loaded={};
    for (const track of Object.keys(TRACKS)) {
      const rows = await readSheet(TRACKS[track].tab);
      loaded[track]=rows.map((r,i)=>rowToItem(track,r,i));
    }
    setItems(loaded);
    const thisWeek = getWeekLabel();
    const lastSavedWeek = localStorage.getItem('hq_last_week');
    const isNewWeek = lastSavedWeek !== thisWeek;
    const goalRows = await readSheet('Weekly Goals');
    const weekRow = goalRows.find(r=>r[0]===thisWeek);
    if (weekRow && !isNewWeek) {
      setGoals({records:weekRow[1]||'',publishing:weekRow[2]||'',songstage:weekRow[3]||'',freelance:weekRow[4]||'',content:weekRow[5]||''});
      setNewWeek(false);
    } else {
      setGoals({});
      setNewWeek(true);
      localStorage.setItem('hq_last_week', thisWeek);
    }
    const [events, cals] = await Promise.all([getCalendarEvents(4), getAllCalendars()]);
    setCalEvents(events);
    setCalendarList(cals);
    setLoading(false);
  }

  async function handleAdd(track, formData) {
    const {name,type,status,extra,dueDate,notes,block,slot,owner}=formData;
    const dateAdded=new Date().toISOString().split('T')[0];
    let row;
    if (track==='songstage') {
      // Feature/Task | Type | Status | Assigned To | Due Date | Sprint | Notes | Date Added
      row=[name,type,status,extra||'',dueDate,'',notes,dateAdded];
    } else if (track==='content') {
      // Title | Type | Status | Platform | Publish Date | Notes | Date Added
      row=[name,type,status,extra||'',dueDate,notes,dateAdded];
    } else {
      // Records, Publishing, Freelance: Name | Type | Status | Extra | Due Date | Notes | Owner | Date Added
      row=[name,type,status,extra||'',dueDate,notes,owner||'',dateAdded];
    }
    if (!demoMode) await appendRow(TRACKS[track].tab, row);
    const newItem={id:items[track].length,name,type,status,extra,dueDate,notes,owner:owner||'',dateAdded,track};
    setItems(prev=>({...prev,[track]:[...prev[track],newItem]}));
    if (block&&slot&&!demoMode) {
      try {
        await createCalendarEvent(name,slot.startISO,slot.endISO,TRACK_COLORS_HEX[track],formData.calendarId||'primary');
        const refreshed=await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✓ "${name}" added + time blocked ${slot.label}`);
      } catch(e) { showToast(`✓ "${name}" added — calendar block failed`); }
    } else { showToast(`✓ "${name}" added to ${TRACKS[track].label}`); }
  }

  async function handleEditCalEvent(ev) {
    if (!demoMode) {
      try {
        await gapi.client.calendar.events.update({
          calendarId: ev._calendarId || 'primary',
          eventId: ev.id,
          resource: { summary: ev.summary, start: ev.start, end: ev.end },
        });
        const refreshed = await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✓ "${ev.summary}" updated`);
      } catch(e) { showToast('Failed to update event'); }
    } else {
      setCalEvents(prev=>prev.map(e=>e===ev||e.summary===ev.summary?ev:e));
      showToast(`✓ "${ev.summary}" updated (demo)`);
    }
  }

  async function handleDeleteCalEvent(ev) {
    // No confirm — just delete
    if (!demoMode) {
      try {
        await gapi.client.calendar.events.delete({ calendarId: ev._calendarId || 'primary', eventId: ev.id });
        const refreshed = await getCalendarEvents(4);
        setCalEvents(refreshed);
        showToast(`✕ "${ev.summary}" deleted`);
      } catch(e) { showToast('Failed to delete event'); }
    } else {
      setCalEvents(prev=>prev.filter(e=>e!==ev));
      showToast(`✕ "${ev.summary}" deleted (demo)`);
    }
  }

  async function handleAddCalEvent(ev) {
    const targetCalId = ev.calendarId || 'primary';
    if (!demoMode) {
      try {
        await createCalendarEvent(ev.title, ev.startISO, ev.endISO, ev.color||'#888', targetCalId);
        const refreshed=await getCalendarEvents(4);
        setCalEvents(refreshed);
        const calName = calendarList.find(c=>c.id===targetCalId)?.summary || targetCalId;
        showToast(`✓ "${ev.title}" added to ${calName}`);
      } catch(e) { showToast(`Failed to add event: ${e.message}`); }
    } else {
      setCalEvents(prev=>[...prev,{
        summary:ev.title,
        start:{dateTime:ev.startISO},
        end:{dateTime:ev.endISO},
        _track:ev.track,
      }]);
      showToast(`✓ "${ev.title}" added (demo)`);
    }
  }

  async function handleStatusChange(track, item, newStatus) {
    if (!demoMode) await updateCell(TRACKS[track].tab,item.id,2,newStatus);
    setItems(prev=>({...prev,[track]:prev[track].map(i=>i.id===item.id?{...i,status:newStatus}:i)}));
    showToast(`↑ "${item.name}" → ${newStatus}`);
  }

  async function handleEditItem(track, oldItem, newItem) {
    if (!demoMode) {
      try {
        const tab = TRACKS[track].tab;
        await updateCell(tab, oldItem.id, 0, newItem.name);
        await updateCell(tab, oldItem.id, 1, newItem.type);
        await updateCell(tab, oldItem.id, 2, newItem.status);
        await updateCell(tab, oldItem.id, 3, newItem.extra);
        await updateCell(tab, oldItem.id, 4, newItem.dueDate);
        if (track==='songstage') {
          await updateCell(tab, oldItem.id, 6, newItem.notes); // Notes is col 6 in Songstage
        } else if (track==='content') {
          await updateCell(tab, oldItem.id, 5, newItem.notes); // Notes is col 5 in Content
        } else {
          await updateCell(tab, oldItem.id, 5, newItem.notes);
          await updateCell(tab, oldItem.id, 6, newItem.owner || '');
        }
      } catch(e) { console.error('Edit save failed:', e); }
    }
    setItems(prev => ({
      ...prev,
      [track]: prev[track].map(i => i.id === oldItem.id ? {...i, ...newItem} : i)
    }));
    showToast(`✓ "${newItem.name}" updated`);
  }

  async function handleDelete(track, item) {
    // Remove immediately from UI
    setItems(prev=>({...prev,[track]:prev[track].filter(i=>i.id!==item.id)}));
    // Show undo toast — if user doesn't undo within 5s, delete from sheet
    let undone = false;
    showUndoToast(`"${item.name}" deleted`, async () => {
      undone = true;
      // Restore item to UI
      setItems(prev=>({...prev,[track]:[...prev[track], item].sort((a,b)=>a.id-b.id)}));
    });
    setTimeout(async () => {
      if (!undone && !demoMode) {
        try { await deleteRowFromSheet(TRACKS[track].tab, item.id); }
        catch(e) { console.error('Delete failed:', e); }
      }
    }, 5500);
  }

  async function handleMarkDone(track, item) {
    const doneStatus = getSmartDoneStatus(track, item);
    await handleStatusChange(track, item, doneStatus);
    // Write completion date to sheet col 9 for stats tracking
    if (!demoMode) {
      try {
        const today = new Date().toISOString().split('T')[0];
        await updateCell(TRACKS[track].tab, item.id, 9, today);
      } catch(e) {}
    }
  }

  async function handleGoalBlur(track, val) {
    // Auto-save single goal on blur
    if (!val?.trim() || demoMode) return;
    const thisWeek = getWeekLabel();
    // Read existing goals row and update just this track
    try {
      const goalRows = await readSheet('Weekly Goals');
      const existingIdx = goalRows.findIndex(r=>r[0]===thisWeek);
      const trackOrder = ['records','publishing','songstage','freelance','content'];
      const colIdx = trackOrder.indexOf(track) + 1;
      if (existingIdx >= 0) {
        await updateCell('Weekly Goals', existingIdx, colIdx, val);
      } else {
        const row = [thisWeek,'','','','',''];
        row[colIdx] = val;
        await appendRow('Weekly Goals', row);
      }
    } catch(e) { console.error('Auto-save goal failed:', e); }
  }

  async function handleSaveGoals() {
    if (!demoMode) await appendRow('Weekly Goals',[getWeekLabel(),goals.records||'',goals.publishing||'',goals.songstage||'',goals.freelance||'',goals.content||'']);
    setNewWeek(false);
    localStorage.setItem('hq_last_week', getWeekLabel());
    showToast('✓ Goals locked in for the week');
    setPage('dashboard');
  }

  async function handleTasksGenerated(track, tasks, slots={}) {
    if (!tasks || tasks.length === 0) return;
    const dateAdded = new Date().toISOString().split('T')[0];
    const newItems = [];
    let blockedCount = 0;

    for (let i=0; i<tasks.length; i++) {
      const task = tasks[i];
      const taskType   = task.type   || TYPES[track][0];
      const taskStatus = task.status || STATUSES[track][0];
      const slot = slots[i];

      const row = [task.name, taskType, taskStatus, '', slot?.label||'', task.notes||'', '', dateAdded];
      if (!demoMode) await appendRow(TRACKS[track].tab, row);

      if (slot && !demoMode) {
        try {
          const kjCal = calendarList.find(c=>
          c.summary?.toLowerCase().includes('k&j')||
          c.summary?.toLowerCase().includes('joint')||
          c.summary?.toLowerCase().includes('k & j')
        )?.id || 'primary';
        await createCalendarEvent(task.name, slot.startISO, slot.endISO, TRACK_COLORS_HEX[track], kjCal);
          blockedCount++;
        } catch(e) { console.error('Calendar block failed:', task.name, e); }
      }

      newItems.push({
        id: items[track].length + newItems.length,
        name: task.name, type: taskType, status: taskStatus,
        extra: '', dueDate: slot?.label||'', notes: task.notes||'',
        taskType: '', dateAdded, track,
      });
    }

    setItems(prev => ({ ...prev, [track]: [...prev[track], ...newItems] }));

    if (blockedCount > 0 && !demoMode) {
      const refreshed = await getCalendarEvents(4);
      setCalEvents(refreshed);
      showToast(`✓ ${tasks.length} tasks added · ${blockedCount} time blocks created`);
    } else {
      showToast(`✓ ${tasks.length} tasks added to ${TRACKS[track].label}`);
    }
  }

  // AUTH SCREEN
  if (!authed&&!demoMode) {
    return (
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo">Jesse HQ</div>
          <div className="auth-tagline">Your command center across all five tracks</div>
          <div className="auth-features">
            {Object.entries(TRACKS).map(([key,t])=>(
              <div key={key} className="auth-feature">
                <div className="auth-feature-dot" style={{background:t.color}}/>{t.label}
              </div>
            ))}
          </div>
          <button className="google-btn" onClick={requestToken}>
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
            Sign in with Google
          </button>
          <button className="demo-btn" onClick={()=>setDemoMode(true)}>Try Demo Mode</button>
        </div>
      </div>
    );
  }

  const trackKeys=Object.keys(TRACKS);

  // Transition screen — full takeover, no sidebar
  if (appMode === 'transitioning') {
    return <TransitionScreen onDone={handleTransitionDone}/>;
  }

  return (
    <div className="app">
      <div className={`sidebar-overlay${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="logo">
          <div className="logo-text">Jesse HQ</div>
          <div className="logo-sub">{appMode==='personal'?'Personal Mode':demoMode?'Demo Mode':'Connected'}</div>
        </div>
        <nav className="nav">
          {appMode === 'personal' ? (
            <>
              <div className="nav-section-label">Personal</div>
              <div className={`nav-item${page==='personal'?' active':''}`} data-track="personal" onClick={()=>{setPage('personal');setSidebarOpen(false);}}>
                <div className="nav-dot" style={{background:'var(--accent)'}}/>Personal Mode
              </div>
              <div style={{borderTop:'1px solid var(--border)',margin:'12px 0'}}/>
              <div className="nav-section-label">Work</div>
              {[['today','Today'],['dashboard','Dashboard'],['calendar','Calendar'],['checkin','Monday Check-In']].map(([key,label])=>(
                <div key={key} className={`nav-item${page===key?' active':''}`} data-track={key} onClick={()=>{setPage(key);setSidebarOpen(false);}}>
                  <div className={`nav-dot ${key}`}/>{label}
                </div>
              ))}
            </>
          ) : (
            <>
              <div className="nav-section-label">Overview</div>
              {[['today','Today'],['dashboard','Dashboard'],['calendar','Calendar'],['checkin','Monday Check-In']].map(([key,label])=>(
                <div key={key} className={`nav-item${page===key?' active':''}`} data-track={key} onClick={()=>{setPage(key);setSidebarOpen(false);}}>
                  <div className={`nav-dot ${key}`}/>{label}
                </div>
              ))}
              <div className="nav-section-label" style={{marginTop:'8px'}}>Tracks</div>
              {Object.entries(TRACKS).map(([key,t])=>(
                <div key={key} className={`nav-item${page===key?' active':''}`} data-track={key} onClick={()=>{setPage(key);setSidebarOpen(false);}}>
                  <div className={`nav-dot ${key}`}/>{t.label}
                </div>
              ))}
            </>
          )}
        </nav>
        <div className="sidebar-bottom">
          <div className="auth-status">
            <div className={`auth-dot${authed?' connected':''}`}/>
            {authed?'Sheets + Calendar':demoMode?'Demo mode':'Not connected'}
          </div>
          {!authed&&!demoMode&&<button className="signin-btn" onClick={requestToken}>Connect Google</button>}
          {appMode==='personal'&&(
            <button className="signin-btn" style={{marginTop:'8px',background:'transparent',border:'1px solid var(--border)',color:'var(--text2)'}} onClick={handleExitPersonal}>
              ↩ Back to Work Mode
            </button>
          )}
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
            <div className="topbar-title">
            {appMode==='personal'&&page==='personal'&&'Personal Mode'}
            {page==='today'&&'Today'}
            {page==='dashboard'&&'Dashboard'}
            {page==='calendar'&&'Calendar'}
            {page==='checkin'&&'Monday Check-In'}
            {TRACKS[page]&&TRACKS[page].label}
            </div>
          </div>
          <div className="topbar-right">
            <span className="week-badge">{getWeekLabel()}</span>
            {trackKeys.includes(page)&&<button className="add-btn" onClick={()=>setModal({track:page})}>+ Add Item</button>}
            {appMode==='work'&&page==='today'&&(
              <button className="end-workday-btn" style={{fontSize:'11px',padding:'6px 14px'}} onClick={handleEndWorkday}>End Workday</button>
            )}
          </div>
        </div>

        {appMode==='personal'&&page==='personal'&&<PersonalModePage onExitPersonal={handleExitPersonal} onBeginWorkDay={handleBeginWorkDay}/>}
        {page==='today'&&<TodayPage items={items} goals={goals} calEvents={calEvents}
          onMarkDone={(track,item)=>handleMarkDone(track,item)}
          onEdit={(track,oldItem,newItem)=>handleEditItem(track,oldItem,newItem)}
          onGoToCheckin={()=>setPage('checkin')}
          onEndWorkday={handleEndWorkday}/>}
        {page==='dashboard'&&<DashboardPage items={items} goals={goals} calEvents={calEvents} newWeek={newWeek}
          onCheckIn={()=>setPage('checkin')}
          onAddToWeek={(item)=>{setPage('checkin');showToast(`Adding "${item.name}" to weekly focus`);}}
          onMarkDone={(track,item)=>handleMarkDone(track,item)}
          onEdit={(track,oldItem,newItem)=>handleEditItem(track,oldItem,newItem)}/>}
        {page==='calendar'&&<CalendarPage calEvents={calEvents} calendarList={calendarList} onAddEvent={handleAddCalEvent} onEditEvent={handleEditCalEvent} onDeleteEvent={handleDeleteCalEvent} demoMode={demoMode}/>}
        {page==='checkin'&&<CheckInPage items={items} calEvents={calEvents} goals={goals}
          onGoalChange={(track,val)=>setGoals(g=>({...g,[track]:val}))}
          onGoalBlur={handleGoalBlur}
          onSave={handleSaveGoals}
          onTasksGenerated={handleTasksGenerated}
          demoMode={demoMode}/>}
        {trackKeys.includes(page)&&<TrackPage track={page} items={items[page]||[]} loading={loading}
          calEvents={calEvents}
          onAdd={()=>setModal({track:page})}
          onStatusChange={(item,status)=>handleStatusChange(page,item,status)}
          onDelete={(item)=>handleDelete(page,item)}
          onMarkDone={(item)=>handleMarkDone(page,item)}
          onEdit={(oldItem,newItem)=>handleEditItem(page,oldItem,newItem)}/>}
      </div>

      {appMode==='shutting_down'&&<ShutdownModal items={items} onClose={()=>setAppMode('work')} onComplete={handleShutdownComplete}/>}
      {modal&&<AddItemModal track={modal.track} calEvents={calEvents} calendarList={calendarList} onClose={()=>setModal(null)} onAdd={formData=>handleAdd(modal.track,formData)}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
      {undoToast&&<div style={{position:'fixed',bottom:'80px',right:'24px',zIndex:'2001'}}><UndoToast message={undoToast.message} onUndo={undoToast.onUndo} onClose={()=>setUndoToast(null)}/></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
